      const left = document.createElement("div");
      left.appendChild(helpSection("global", [
        ["command palette", ["⌘K", "Ctrl+Alt+K"]],
        ["paste", ["⌘V", "Ctrl+Shift+V*"]],
        ["this help", ["⌘K → keyboard shortcuts"]],
      ]));
      left.appendChild(helpSection("mouse", [
        ["focus pane", ["click"]],
        ["select + copy text", ["drag"]],
        ["rectangular selection", ["Alt+drag"]],
        ["pane / tab / workspace menu", ["right-click"]],
        ["resize splits", ["drag the border"]],
        ["rename pane / tab / workspace", ["double-click its title"]],
        ["scrollback", ["wheel", "drag the scrollbar"]],
      ]));
      cols.appendChild(left);

      // Copy-mode bindings reflect the active table (config-injected or default).
      const actions = [
        ["move", ["move-left", "move-down", "move-up", "move-right"]],
        ["line start / end", ["line-start", "line-end"]],
        ["top / bottom", ["top", "bottom"]],
        ["begin selection", ["select"]],
        ["rectangle toggle", ["rect"]],
        ["yank to clipboard", ["yank"]],
        ["exit copy mode", ["exit"]],
      ];
      const table = (window.__herdrKeys && window.__herdrKeys.copyMode) || COPY_MODE_DEFAULT;
      const right = document.createElement("div");
      right.appendChild(helpSection("copy mode (⬚ on a pane header)",
        actions.map(([what, acts]) => [what, acts.flatMap((a) => table[a] || [])])));
      right.appendChild(helpSection("pane header buttons", [
        ["split left/right · top/bottom", ["⊟", "⊞"]],
        ["zoom", ["⤢"]],
        ["copy mode · copy scrollback", ["⬚", "⧉"]],
        ["rename · close", ["✎", "✕"]],
      ]));
      cols.appendChild(right);

      body.appendChild(cols);
      const note = document.createElement("p");
      note.className = "hint";
      note.textContent = "* browser paste shortcuts vary; the ⌘V path asks for clipboard permission once. Everything else is typed straight into the focused terminal.";
      body.appendChild(note);
      m.appendChild(body);
      const btns = document.createElement("div"); btns.className = "btns";
      btns.appendChild(mkModalBtn("close", "primary", closeModal));
      m.appendChild(btns);
      m.addEventListener("keydown", (e) => { e.stopPropagation(); if (e.key === "Escape") { e.preventDefault(); closeModal(); } });
      ov.appendChild(m);
    });
  }

  // ---- Settings modal (WS8): theme + copy-mode keys over config.get/set ----
  //
  // Theme edits live-preview immediately (inline :root custom-property
  // overrides); cancel/Escape rolls the preview back to the config.get values,
  // save persists via config.set and keeps it. Copy-mode rebinds and other
  // clients' theme apply on their next page load (the server re-renders the
  // served page); server settings are shown read-only — they need a restart.

  function openSettings() {
    sendCmdAwait("config.get", {}, (res) => {
      if (!res.ok) { toast("config.get failed: " + (res.error || "unknown")); return; }
      buildSettingsModal(res.data || {});
    });
  }

  function buildSettingsModal(cfg) {
    const colors = (cfg.theme && cfg.theme.colors) || {};
    const copyMode = cfg.copy_mode || {};
    const server = cfg.server || {};
    const root = document.documentElement;

    const prevFont = root.style.fontFamily;
    let saved = false;
    const applyColor = (k, v) => root.style.setProperty("--" + k, v);
    const applyFont = (f) => { root.style.fontFamily = f; document.body.style.fontFamily = f; };
    const rollback = () => {
      for (const k in colors) root.style.removeProperty("--" + k);
      root.style.fontFamily = prevFont;
      document.body.style.fontFamily = "";
    };

    openOverlay((ov) => {
      const m = document.createElement("div"); m.className = "modal settings";
      const h = document.createElement("header"); h.textContent = "settings — " + (cfg.path || "config"); m.appendChild(h);
      const body = document.createElement("div"); body.className = "body";
      const section = (title) => { const t = document.createElement("h3"); t.textContent = title; body.appendChild(t); };
      const row = (labelText) => {
        const r = document.createElement("div"); r.className = "row";
        const l = document.createElement("label"); l.textContent = labelText; r.appendChild(l);
        body.appendChild(r);
        return r;
      };
      const isHex = (v) => /^#[0-9a-fA-F]{6}$/.test(v);

      section("theme");
      const colorInputs = {};
      for (const key of Object.keys(colors).sort()) {
        const r = row(key);
        const swatch = document.createElement("input"); swatch.type = "color";
        const hex = document.createElement("input"); hex.type = "text"; hex.spellcheck = false;
        hex.value = colors[key];
        if (isHex(colors[key])) swatch.value = colors[key];
        swatch.addEventListener("input", () => { hex.value = swatch.value; applyColor(key, swatch.value); });
        hex.addEventListener("input", () => {
          const v = hex.value.trim();
          if (isHex(v)) swatch.value = v;
          if (v) applyColor(key, v);
        });
        r.appendChild(swatch); r.appendChild(hex);
        colorInputs[key] = hex;
      }
      const fr = row("font");
      const fontInput = document.createElement("input"); fontInput.type = "text"; fontInput.spellcheck = false;
      fontInput.value = (cfg.theme && cfg.theme.font) || "";
      fontInput.addEventListener("input", () => { if (fontInput.value.trim()) applyFont(fontInput.value.trim()); });
      fr.appendChild(fontInput);

      // The action set comes from config.get, so every row is a known action.
      section("copy-mode keys");
      const keyInputs = {};
      for (const action of Object.keys(copyMode).sort()) {
        const r = row(action);
        const inp = document.createElement("input"); inp.type = "text"; inp.spellcheck = false;
        inp.title = "comma-separated KeyboardEvent.key values";
        inp.value = (copyMode[action] || []).join(", ");
        r.appendChild(inp);
        keyInputs[action] = inp;
      }

      section("server (read-only)");
      const ro = (label, val) => {
        const r = row(label);
        const s = document.createElement("span"); s.className = "ro"; s.textContent = val;
        r.appendChild(s);
      };
      ro("addr", server.addr || "");
      ro("auth", server.auth || "");
      ro("tls", server.tls ? "on" : "off");
      ro("termhost socket", server.termhost_socket || "");
      ro("control socket", server.control_socket || "(default)");
      ro("hook socket", server.hook_socket || "(disabled)");
      ro("session ttl", server.session_ttl || "");
      const note = document.createElement("div"); note.className = "hint";
      note.textContent = "server settings come from flags/config file and take effect on restart";
      body.appendChild(note);

      const errEl = document.createElement("div"); errEl.className = "errline"; body.appendChild(errEl);
      m.appendChild(body);

      const save = () => {
        const outColors = {};
        for (const k in colorInputs) {
          const v = colorInputs[k].value.trim();
          if (v) outColors[k] = v;
        }
        const outKeys = {};
        for (const a in keyInputs) {
          const keys = keyInputs[a].value.split(",").map((s) => s.trim()).filter(Boolean);
          if (!keys.length) { errEl.textContent = "copy-mode " + a + ": needs at least one key"; return; }
          outKeys[a] = keys;
        }
        const font = fontInput.value.trim();
        sendCmdAwait("config.set", { theme: { colors: outColors, font }, copy_mode: outKeys }, (res) => {
          if (!res.ok) { errEl.textContent = res.error || "save failed"; return; }
          saved = true;
          // Apply the saved theme to this page right away; other clients get it
          // on their next load from the re-rendered served page.
          for (const k in outColors) applyColor(k, outColors[k]);
          if (font) applyFont(font);
          closeModal();
          toast("settings saved");
          if (Object.keys(outKeys).some((a) => outKeys[a].join(",") !== (copyMode[a] || []).join(","))) {
            toast("copy-mode rebinds apply after a page reload");
          }
        });
      };

      const btns = document.createElement("div"); btns.className = "btns";
      btns.appendChild(mkModalBtn("cancel", "", closeModal));
      btns.appendChild(mkModalBtn("save", "primary", save));
      m.appendChild(btns);
      m.addEventListener("keydown", (e) => {
        e.stopPropagation();
        if (e.key === "Enter") { e.preventDefault(); save(); }
        else if (e.key === "Escape") { e.preventDefault(); closeModal(); }
      });
      ov.appendChild(m);
      // Any close path (cancel, Escape, backdrop) rolls the preview back unless
      // it was saved.
      modalCleanup = () => { if (!saved) rollback(); };
    });
  }

  // ---- Update banner (WS8): the update_ready message ----
  function showBanner(text) {
    bannerEl.innerHTML = "";
    const t = document.createElement("span"); t.textContent = text;
    const x = document.createElement("span"); x.className = "x"; x.textContent = "✕"; x.title = "dismiss";
    x.addEventListener("click", () => bannerEl.classList.remove("show"));
    bannerEl.appendChild(t); bannerEl.appendChild(x);
    bannerEl.classList.add("show");
  }

  // ---- Status & toasts ----
  function setStatus(t, err) {
    connEl.textContent = t;
    connEl.className = err ? "err" : (t.startsWith("connected") ? "ok" : "");
    gridEl.textContent = cols && rows ? `${cols}×${rows}` : "";
  }
  function toast(text) {
    const el = document.createElement("div");
    el.className = "toast"; el.textContent = text;
    toastsEl.appendChild(el);
    requestAnimationFrame(() => el.classList.add("show"));
    setTimeout(() => { el.classList.remove("show"); setTimeout(() => el.remove(), 250); }, 4000);
  }

  // ---- Notifications (WS6): agent needs-attention / finished ----
  // herdr parity: suppressed entirely when the pane is on screen and the window
  // is focused (the user is already looking at it). Otherwise a toast; and when
  // the page is unfocused/hidden, additionally a native Notification (if the
  // user granted permission) whose click reveals the pane — agent.focus crosses
  // workspaces and tabs.
  function handleNotify(msg) {
    // Non-agent kinds (e.g. an update notice) always toast — there is no pane
    // whose visibility could make them redundant.
    if (msg.kind !== "attention" && msg.kind !== "finished") {
      toast(msg.message + (msg.body ? " — " + msg.body : ""));
      return;
    }
    const visible = msg.pane ? panes.has(msg.pane) : false;
    const focused = document.hasFocus();
    if (focused && visible) return;
    toast(msg.message + (msg.body ? " — " + msg.body : ""));
    if (focused || !("Notification" in window) || Notification.permission !== "granted") return;
    const n = new Notification(msg.message, { body: msg.body || "", tag: "herdr-pane-" + (msg.pane || 0) });
    n.onclick = () => {
      window.focus();
      if (msg.pane) sendCmd("agent.focus", { pane: msg.pane });
      n.close();
    };
  }

  // The Notification API only grants permission from a user gesture, so ask
  // once on the first click/keypress.
  (function armNotificationPermission() {
    if (!("Notification" in window) || Notification.permission !== "default") return;
    const req = () => {
      window.removeEventListener("pointerdown", req);
      window.removeEventListener("keydown", req);
      Notification.requestPermission();
    };
    window.addEventListener("pointerdown", req);
    window.addEventListener("keydown", req);
  })();

  // ---- Session ----
  function connect() {
    const proto = location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(`${proto}://${location.host}/ws`);
    ws.onopen = () => {
      sendMsg({ t: "init", v: PV, cols, rows, dpr,
        cell_w_px: Math.round(cellW * dpr), cell_h_px: Math.round(cellH * dpr) });
    };
    ws.onmessage = (ev) => onMessage(JSON.parse(ev.data));
    ws.onclose = () => { setStatus("disconnected — retrying…", true); setTimeout(connect, 1500); };
    ws.onerror = () => ws.close();
  }

  let resizeTimer = null;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      gridSize();
      sendMsg({ t: "resize", cols, rows });
      setStatus("connected");
    }, 120);
  });

  // Status-bar affordances: the zoom chip unzooms, the palette hint opens it,
  // the gear opens settings.
  zoomIndEl.addEventListener("click", () => sendCmd("pane.zoom", {}));
  palHintEl.addEventListener("click", () => openPalette());
  gearEl.addEventListener("click", () => openSettings());

  measure();
  gridSize();
  connect();
})();
</script>
</body>
</html>
