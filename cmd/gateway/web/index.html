<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>herdr · web</title>
<style>
  :root { --bg:#181818; --fg:#d4d4d4; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; overflow:hidden; }
  #screen { display:block; outline:none; }
  #status { position:fixed; left:8px; bottom:6px; font-size:11px; color:#888;
    background:rgba(0,0,0,.45); padding:2px 6px; border-radius:4px; pointer-events:none; z-index:5; }
  #status.err { color:#ff6b6b; }
  #toasts { position:fixed; right:10px; top:10px; display:flex; flex-direction:column; gap:6px; z-index:6; }
  .toast { background:#2a2a2a; color:#eee; border:1px solid #3a3a3a; border-left:3px solid #6aa0ff;
    padding:6px 10px; border-radius:5px; font-size:12px; max-width:340px; box-shadow:0 2px 8px rgba(0,0,0,.4);
    opacity:0; transform:translateX(8px); transition:opacity .2s, transform .2s; }
  .toast.show { opacity:1; transform:none; }
</style>
</head>
<body>
<canvas id="screen" tabindex="0"></canvas>
<div id="status">connecting…</div>
<div id="toasts"></div>
<script>
(() => {
  const FONT_PX = 15, LINE = 1.25;
  const canvas = document.getElementById("screen");
  const ctx = canvas.getContext("2d", { alpha: false });
  const statusEl = document.getElementById("status");
  const toastsEl = document.getElementById("toasts");
  const dpr = window.devicePixelRatio || 1;

  // Grid + frame state.
  let cellW = 9, cellH = 19, cols = 0, rows = 0;
  let W = 0, H = 0, cells = [], links = [], cur = null;
  let mouseCapture = false, ws = null;
  let defBg = "#181818", defFg = "#d4d4d4";

  // ratatui Modifier bits.
  const M_BOLD = 0x1, M_DIM = 0x2, M_ITALIC = 0x4, M_UNDERLINED = 0x8, M_REVERSED = 0x40, M_HIDDEN = 0x80;

  function readTheme() {
    const css = getComputedStyle(document.documentElement);
    defBg = css.getPropertyValue("--bg").trim() || "#181818";
    defFg = css.getPropertyValue("--fg").trim() || "#d4d4d4";
  }

  function measure() {
    ctx.font = `${FONT_PX}px ui-monospace, Menlo, monospace`;
    cellW = Math.max(1, Math.round(ctx.measureText("M").width * 100) / 100);
    cellH = Math.ceil(FONT_PX * LINE);
  }

  function layout() {
    cols = Math.max(20, Math.floor(window.innerWidth / cellW));
    rows = Math.max(6, Math.floor(window.innerHeight / cellH));
    canvas.style.width = window.innerWidth + "px";
    canvas.style.height = window.innerHeight + "px";
    canvas.width = Math.floor(window.innerWidth * dpr);
    canvas.height = Math.floor(window.innerHeight * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    measure();
  }

  // Coalesce redraws to one per animation frame.
  let dirty = false;
  function scheduleDraw() {
    if (dirty) return;
    dirty = true;
    requestAnimationFrame(() => { dirty = false; draw(); });
  }

  // Focus emphasis: herdr marks the active sidebar row (agent/workspace) with a
  // subtle dark background (palette surface_dim). Detect that left-anchored,
  // partial-width highlight band and make it bolder — brighten the band and add
  // a bright accent stripe down its left edge.
  const ACCENT = "#5b9dff";
  const BAND_MIN_W = 5;

  function parseHex(css) {
    const m = /^#([0-9a-fA-F]{6})$/.exec(css);
    if (!m) return null;
    const n = parseInt(m[1], 16);
    return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
  }

  function toHex(r, g, b) {
    return "#" + ((1 << 24) | (Math.round(r) << 16) | (Math.round(g) << 8) | Math.round(b)).toString(16).slice(1);
  }

  function lighten(css, amt) {
    const p = parseHex(css);
    if (!p) return css;
    return toHex(p[0] + (255 - p[0]) * amt, p[1] + (255 - p[1]) * amt, p[2] + (255 - p[2]) * amt);
  }

  // Mix color a toward color b by t (0..1). Used to render DIM/faint text.
  function blend(a, b, t) {
    const pa = parseHex(a), pb = parseHex(b);
    if (!pa || !pb) return a;
    return toHex(pa[0] + (pb[0] - pa[0]) * t, pa[1] + (pb[1] - pa[1]) * t, pa[2] + (pb[2] - pa[2]) * t);
  }

  // Returns { boost: Map(cellIndex -> brightenedBg), stripes: [rowY...] }.
  function findHighlightBands() {
    const boost = new Map(), stripes = [];
    if (!W || !H) return { boost, stripes };
    const maxW = Math.max(BAND_MIN_W, Math.floor(W * 0.55)); // exclude full-width bars
    for (let y = 0; y < H; y++) {
      const c0 = cells[y * W];
      const bg = (c0 && c0.b) || "";
      if (!bg) continue; // band must touch the left edge (the sidebar)
      let x2 = 0;
      while (x2 < W) { const cc = cells[y * W + x2]; if (!cc || (cc.b || "") !== bg) break; x2++; }
      if (x2 >= BAND_MIN_W && x2 <= maxW) {
        const lb = lighten(bg, 0.09);
        for (let xi = 0; xi < x2; xi++) boost.set(y * W + xi, lb);
        stripes.push(y);
      }
    }
    return { boost, stripes };
  }

  function draw() {
    ctx.fillStyle = defBg;
    ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
    ctx.textBaseline = "top";
    const { boost, stripes } = findHighlightBands();
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const idx = y * W + x;
        const c = cells[idx];
        if (!c) continue;
        const m = c.m || 0;
        let fg = c.f || defFg, bg = c.b || defBg;
        if (m & M_REVERSED) { const t = fg; fg = bg; bg = t; }
        const bb = boost.get(idx);
        if (bb) bg = bb;
        if (m & M_DIM) fg = blend(fg, bg, 0.5); // faint text (e.g. Claude Code suggestions)
        const px = x * cellW, py = y * cellH;
        if (bg !== defBg) { ctx.fillStyle = bg; ctx.fillRect(px, py, cellW + 0.5, cellH + 0.5); }
        const ch = c.s;
        if (ch && ch !== " " && !(m & M_HIDDEN)) {
          let font = "";
          if (m & M_BOLD) font += "bold ";
          if (m & M_ITALIC) font += "italic ";
          ctx.font = `${font}${FONT_PX}px ui-monospace, Menlo, monospace`;
          ctx.fillStyle = fg;
          ctx.fillText(ch, px, py + 1);
          if ((m & M_UNDERLINED) || c.h) { ctx.fillRect(px, py + cellH - 2, cellW, 1); }
        }
      }
    }
    if (stripes.length) {
      ctx.fillStyle = ACCENT;
      for (const y of stripes) ctx.fillRect(0, y * cellH, 3, cellH + 0.5);
    }
    if (cur && cur.vis) {
      ctx.fillStyle = defFg; ctx.globalAlpha = 0.7;
      ctx.fillRect(cur.x * cellW, cur.y * cellH, cellW, cellH);
      ctx.globalAlpha = 1;
    }
  }

  function setStatus(t, err) { statusEl.textContent = t; statusEl.className = err ? "err" : ""; }

  function toast(text) {
    const el = document.createElement("div");
    el.className = "toast"; el.textContent = text;
    toastsEl.appendChild(el);
    requestAnimationFrame(() => el.classList.add("show"));
    setTimeout(() => { el.classList.remove("show"); setTimeout(() => el.remove(), 250); }, 4000);
  }

  function onMessage(msg) {
    switch (msg.t) {
      case "frame":
        W = msg.w; H = msg.h; cells = msg.cells; links = msg.links || []; cur = msg.cur || null;
        scheduleDraw(); break;
      case "fdiff":
        if (msg.cells) for (const dc of msg.cells) cells[dc.i] = dc;
        cur = msg.cur || null; scheduleDraw(); break;
      case "mouse": mouseCapture = !!msg.enabled; break;
      case "title": document.title = msg.title ? ("herdr · " + msg.title) : "herdr · web"; break;
      case "clipboard":
        try { navigator.clipboard.writeText(b64decode(msg.data)); } catch (e) {}
        break;
      case "notify": toast(msg.message + (msg.body ? ": " + msg.body : "")); break;
      case "error": setStatus("error: " + msg.msg, true); break;
      case "shutdown": setStatus("server shut down", true); break;
    }
  }

  function b64decode(s) {
    try { return decodeURIComponent(escape(atob(s))); } catch (e) { return atob(s); }
  }

  function connect() {
    const proto = location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(`${proto}://${location.host}/ws`);
    ws.onopen = () => { setStatus(`connected · ${cols}×${rows}`); ws.send(JSON.stringify({ t: "init", cols, rows })); };
    ws.onmessage = (ev) => onMessage(JSON.parse(ev.data));
    ws.onclose = () => { setStatus("disconnected — retrying…", true); setTimeout(connect, 1500); };
    ws.onerror = () => ws.close();
  }

  function send(data) { if (ws && ws.readyState === 1) ws.send(JSON.stringify({ t: "input", data })); }
  function sendPaste(text) { if (ws && ws.readyState === 1) ws.send(JSON.stringify({ t: "paste", data: text })); }
  function sendImage(ext, b64) { if (ws && ws.readyState === 1) ws.send(JSON.stringify({ t: "image", ext, data: b64 })); }

  // Cmd+V: read clipboard text and forward it as a paste. Toasts surface why a
  // paste did nothing (no permission, empty clipboard, unsupported browser).
  function pasteText() {
    if (!navigator.clipboard || !navigator.clipboard.readText) { toast("clipboard read unavailable in this browser"); return; }
    navigator.clipboard.readText()
      .then((t) => { if (t) { sendPaste(t); toast("pasted " + t.length + " chars"); } else toast("clipboard has no text"); })
      .catch((err) => toast("paste blocked: " + ((err && err.name) || err)));
  }

  // Ctrl+V: read an image off the clipboard and send it for herdr to stage and
  // paste into the focused pane (how Claude Code receives images).
  function pasteImage() {
    if (!navigator.clipboard || !navigator.clipboard.read) { toast("clipboard image read unavailable in this browser"); return; }
    navigator.clipboard.read()
      .then(async (items) => {
        for (const item of items) {
          const type = item.types.find((t) => t.indexOf("image/") === 0);
          if (type) {
            const blob = await item.getType(type);
            const buf = await blob.arrayBuffer();
            sendImage(type.split("/")[1] || "png", base64FromBuffer(buf));
            toast("pasted image (" + blob.size + " bytes)");
            return;
          }
        }
        toast("clipboard has no image");
      })
      .catch((err) => toast("image paste blocked: " + ((err && err.name) || err)));
  }

  function base64FromBuffer(buf) {
    const bytes = new Uint8Array(buf);
    let bin = "";
    const chunk = 0x8000;
    for (let i = 0; i < bytes.length; i += chunk) bin += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
    return btoa(bin);
  }

  // ---- Keyboard ----
  const SPECIAL = {
    Enter: "\r", Backspace: "\x7f", Tab: "\t", Escape: "\x1b",
    ArrowUp: "\x1b[A", ArrowDown: "\x1b[B", ArrowRight: "\x1b[C", ArrowLeft: "\x1b[D",
    Home: "\x1b[H", End: "\x1b[F", PageUp: "\x1b[5~", PageDown: "\x1b[6~",
    Delete: "\x1b[3~", Insert: "\x1b[2~",
  };
  canvas.addEventListener("keydown", (e) => {
    const isV = e.key === "v" || e.key === "V";
    // Ctrl+V → paste an image from the clipboard (staged by herdr as a file path).
    if (e.ctrlKey && !e.metaKey && isV) { e.preventDefault(); pasteImage(); return; }
    // Cmd+V → paste text. A focused <canvas> emits no native 'paste' event, so we
    // read the clipboard directly (this keydown supplies the required user gesture).
    if (e.metaKey && !e.ctrlKey && isV) { e.preventDefault(); pasteText(); return; }
    if (e.metaKey && !e.ctrlKey) return; // leave other Cmd shortcuts to the browser
    let seq = null;
    if (e.key === "Tab" && e.shiftKey) seq = "\x1b[Z"; // backtab (CSI Z) — Claude Code mode cycle
    else if (SPECIAL[e.key]) seq = SPECIAL[e.key];
    else if (e.ctrlKey && e.key.length === 1) {
      const code = e.key.toLowerCase().charCodeAt(0);
      if (code >= 97 && code <= 122) seq = String.fromCharCode(code - 96); // Ctrl-A..Z (incl. Ctrl-C interrupt)
      else if (e.key === " ") seq = "\x00";
    } else if (e.key.length === 1) seq = e.key;
    if (seq !== null) { e.preventDefault(); send(seq); }
  });

  // ---- Paste (Cmd/Ctrl-V, right-click paste) ----
  document.addEventListener("paste", (e) => {
    const text = (e.clipboardData || window.clipboardData).getData("text");
    if (text) { e.preventDefault(); sendPaste(text); }
  });

  // ---- Mouse (SGR 1006), gated on server MouseCapture ----
  function cellCoord(ev) {
    const x = Math.min(W || cols, Math.max(1, Math.floor(ev.clientX / cellW) + 1));
    const y = Math.min(H || rows, Math.max(1, Math.floor(ev.clientY / cellH) + 1));
    return [x, y];
  }
  function mods(ev) { return (ev.shiftKey ? 4 : 0) | (ev.altKey ? 8 : 0) | (ev.ctrlKey ? 16 : 0); }
  function sgr(btn, x, y, press) { send(`\x1b[<${btn};${x};${y}${press ? "M" : "m"}`); }

  let dragging = false, dragBtn = 0, lastCell = "";

  canvas.addEventListener("mousedown", (ev) => {
    canvas.focus();
    const [x, y] = cellCoord(ev);
    if (!mouseCapture) { // allow click-to-open hyperlinks when the app isn't grabbing the mouse
      const c = cells[(y - 1) * W + (x - 1)];
      if (c && c.h && links[c.h - 1]) { window.open(links[c.h - 1], "_blank", "noopener"); }
      return;
    }
    ev.preventDefault();
    dragging = true; dragBtn = ev.button;
    sgr(ev.button + mods(ev), x, y, true);
  });
  window.addEventListener("mouseup", (ev) => {
    if (!mouseCapture || !dragging) return;
    const [x, y] = cellCoord(ev);
    sgr(dragBtn + mods(ev), x, y, false);
    dragging = false;
  });
  canvas.addEventListener("mousemove", (ev) => {
    if (!mouseCapture || !dragging) return;
    const [x, y] = cellCoord(ev);
    const key = x + ":" + y;
    if (key === lastCell) return; // one report per cell to avoid flooding
    lastCell = key;
    sgr(dragBtn + 32 + mods(ev), x, y, true);
  });
  canvas.addEventListener("wheel", (ev) => {
    if (!mouseCapture) return;
    ev.preventDefault();
    const [x, y] = cellCoord(ev);
    sgr((ev.deltaY < 0 ? 64 : 65) + mods(ev), x, y, true);
  }, { passive: false });
  canvas.addEventListener("contextmenu", (ev) => { if (mouseCapture) ev.preventDefault(); });

  // ---- Resize ----
  let resizeTimer = null;
  window.addEventListener("resize", () => {
    layout();
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      if (ws && ws.readyState === 1) { ws.send(JSON.stringify({ t: "resize", cols, rows })); setStatus(`connected · ${cols}×${rows}`); }
      scheduleDraw();
    }, 120);
  });

  readTheme();
  layout();
  canvas.focus();
  connect();
})();
</script>
</body>
</html>
