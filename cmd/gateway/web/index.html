<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>herdr</title>
<style>
  :root {
    --bg:#181818; --fg:#d4d4d4; --accent:#5b9dff; --panel:#141414; --panel2:#1d1d1d;
    --line:#2a2a2a; --muted:#8a8a8a; --chrome:#202430; --chrome-focus:#26314a;
    --ok:#6ac47a; --warn:#e2b64e; --err:#ff6b6b;
  }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; overflow:hidden; }
  #app { position:fixed; inset:0; display:grid; grid-template-columns:220px 1fr; }

  /* ---- Sidebar ---- */
  #sidebar { background:var(--panel); border-right:1px solid var(--line);
    display:flex; flex-direction:column; overflow-y:auto; min-height:0; }
  #brand { font-size:13px; font-weight:600; letter-spacing:.5px; color:#e8e8e8;
    padding:12px 14px; border-bottom:1px solid var(--line); }
  #brand small { color:var(--muted); font-weight:400; margin-left:6px; }
  #sidebar section { padding:10px 6px 4px; }
  #sidebar h2 { font-size:10px; text-transform:uppercase; letter-spacing:.8px; color:var(--muted);
    margin:0 0 6px; padding:0 8px; }
  #sidebar ul { list-style:none; margin:0; padding:0; }
  #sidebar li { font-size:12px; padding:4px 8px; border-radius:4px; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; cursor:default; display:flex; align-items:baseline; gap:6px; }
  #ws-list { position:relative; }
  #ws-list li.ws { cursor:pointer; }
  #ws-list li.ws:hover { background:var(--panel2); }
  #ws-list li.active { color:#e8e8e8; }
  #ws-list li .sum { color:var(--muted); font-size:10px; margin-left:auto; }
  #ws-list li .sum span { margin-left:4px; }
  #ws-list li.add { color:var(--muted); font-style:italic; cursor:pointer; }
  #ws-list li.add:hover { color:var(--accent); background:none; }
  #pane-list li, #agent-list li { cursor:pointer; }
  #pane-list li:hover, #agent-list li:hover { background:var(--panel2); }
  #pane-list li.focused { background:var(--chrome-focus); color:#e8e8e8; }
  #pane-list .dot { color:var(--accent); width:8px; display:inline-block; }
  #pane-list .pub { color:var(--accent); }
  #pane-list .ttl { color:var(--muted); overflow:hidden; text-overflow:ellipsis; }
  #pane-list .ag, #agent-list .aname { margin-left:auto; }
  .ag, .adot, .aname { font-size:11px; }
  .st-working { color:var(--warn); } .st-blocked { color:var(--err); }
  .st-idle { color:var(--ok); } .st-unknown { color:var(--muted); }
  #agent-list li { gap:6px; }
  #agent-list .aname { color:#e8e8e8; margin-left:0; }
  #agent-list .ameta { color:var(--muted); font-size:10px; margin-left:auto; }
  #agent-list li.empty { color:var(--muted); font-style:italic; cursor:default; }
  #agent-list li.empty:hover { background:none; }

  /* ---- Main area ---- */
  #main { display:grid; grid-template-rows:30px 1fr 24px; min-width:0; min-height:0; }
  #tabbar { display:flex; align-items:stretch; gap:2px; padding:0 6px; background:var(--panel);
    border-bottom:1px solid var(--line); overflow-x:auto; position:relative; }
  #tabbar .tab { font-size:12px; color:var(--muted); padding:0 10px; display:flex; align-items:center; gap:6px;
    border-bottom:2px solid transparent; white-space:nowrap; cursor:pointer; }
  #tabbar .tab:hover { color:#ddd; }
  #tabbar .tab.active { color:#e8e8e8; border-bottom-color:var(--accent); }
  #tabbar .tab .x { color:var(--muted); font-size:10px; }
  #tabbar .tab .x:hover { color:var(--err); }
  #tabbar .tab.add { color:var(--muted); font-weight:600; padding:0 12px; }
  #tabbar .tab.add:hover { color:var(--accent); }

  #panes { position:relative; overflow:hidden; }
  .pane { position:absolute; box-sizing:border-box; }
  .pane .chrome { position:absolute; left:0; top:0; right:0; overflow:hidden; display:flex;
    align-items:center; gap:0; font-size:11px; color:#9a9a9a; background:var(--chrome);
    padding:0 4px 0 8px; box-sizing:border-box; }
  .pane.focused .chrome { color:#e8e8e8; background:var(--chrome-focus); }
  .pane .chrome .info { flex:1; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
  .pane .chrome .info .pub { color:var(--accent); }
  .pane .chrome .info .agent { color:var(--warn); }
  .pane .chrome .info .exited { color:var(--err); }
  .pane .chrome .ctl { display:flex; gap:1px; flex:none; }
  .pane .chrome .ctl button { background:none; border:none; color:#9a9a9a; cursor:pointer;
    font-size:12px; line-height:1; padding:2px 4px; border-radius:3px; font-family:inherit; }
  .pane .chrome .ctl button:hover { background:rgba(255,255,255,.12); color:#fff; }
  .pane .chrome .ctl button.close:hover { background:var(--err); color:#fff; }
  .pane canvas { position:absolute; display:block; }
  .pane.focused canvas { outline:1px solid var(--accent); outline-offset:-1px; }

  /* ---- Status bar ---- */
  #statusbar { display:flex; align-items:center; gap:14px; padding:0 12px; font-size:11px;
    color:var(--muted); background:var(--panel); border-top:1px solid var(--line); }
  #statusbar .err { color:var(--err); }
  #statusbar #conn.ok { color:var(--ok); }

  /* ---- Toasts ---- */
  #toasts { position:fixed; right:10px; top:38px; display:flex; flex-direction:column; gap:6px; z-index:6; }
  .toast { background:#2a2a2a; color:#eee; border:1px solid #3a3a3a; border-left:3px solid var(--accent);
    padding:6px 10px; border-radius:5px; font-size:12px; max-width:340px; box-shadow:0 2px 8px rgba(0,0,0,.4);
    opacity:0; transform:translateX(8px); transition:opacity .2s, transform .2s; }
  .toast.show { opacity:1; transform:none; }

  /* ---- Split resize handles (WS8) ---- */
  .split { position:absolute; z-index:4; }
  .split.h { cursor:col-resize; }
  .split.v { cursor:row-resize; }
  .split::after { content:""; position:absolute; inset:0; margin:auto; background:transparent; transition:background .1s; }
  .split.h::after { width:2px; }
  .split.v::after { height:2px; }
  .split:hover::after, .split.dragging::after { background:var(--accent); }

  /* ---- Overlays: dialogs / palette / help (WS8) ---- */
  #overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:8;
    display:flex; align-items:flex-start; justify-content:center; }
  .modal { background:var(--panel2); border:1px solid var(--line); border-radius:8px; margin-top:12vh;
    min-width:360px; max-width:640px; box-shadow:0 8px 30px rgba(0,0,0,.5); font-size:13px; }
  .modal header { padding:10px 14px; font-weight:600; color:#e8e8e8; border-bottom:1px solid var(--line); font-size:12px; }
  .modal .body { padding:12px 14px; }
  .modal .body p { margin:0 0 10px; color:var(--fg); line-height:1.45; }
  .modal input[type=text] { width:100%; box-sizing:border-box; background:var(--bg); color:var(--fg);
    border:1px solid var(--line); border-radius:5px; padding:6px 8px; font:inherit; outline:none; }
  .modal input[type=text]:focus { border-color:var(--accent); }
  .modal .hint { color:var(--muted); font-size:11px; margin-top:8px; }
  .modal .btns { display:flex; gap:8px; justify-content:flex-end; padding:10px 14px; border-top:1px solid var(--line); }
  .modal .btns button { background:var(--panel); color:var(--fg); border:1px solid var(--line); border-radius:5px;
    padding:5px 12px; font:inherit; font-size:12px; cursor:pointer; }
  .modal .btns button:hover { border-color:var(--accent); color:#fff; }
  .modal .btns button.primary { background:var(--accent); border-color:var(--accent); color:#0c1526; font-weight:600; }
  .modal .btns button.danger { background:var(--err); border-color:var(--err); color:#fff; }

  /* ---- Context menu (WS8) ---- */
  #ctxmenu { position:fixed; z-index:9; background:var(--panel2); border:1px solid var(--line); border-radius:6px;
    min-width:190px; padding:4px; box-shadow:0 6px 24px rgba(0,0,0,.5); font-size:12px; }
  #ctxmenu .item { padding:5px 10px; border-radius:4px; cursor:pointer; display:flex; gap:8px;
    align-items:center; white-space:nowrap; }
  #ctxmenu .item:hover { background:var(--chrome-focus); color:#fff; }
  #ctxmenu .item.danger:hover { background:var(--err); }
  #ctxmenu .sep { height:1px; background:var(--line); margin:4px 6px; }

  /* ---- Palette / navigator (WS8) ---- */
  .modal.pal { width:520px; margin-top:9vh; }
  .pal .query { padding:10px 12px; border-bottom:1px solid var(--line); }
  .pal .list { max-height:44vh; overflow-y:auto; padding:4px; }
  .pal .row { display:flex; align-items:baseline; gap:8px; padding:5px 10px; border-radius:4px; cursor:pointer; }
  .pal .row.sel, .pal .row:hover { background:var(--chrome-focus); }
  .pal .row .kind { flex:none; width:52px; color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:.5px; }
  .pal .row .lbl { overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
  .pal .row .meta { margin-left:auto; color:var(--muted); font-size:11px; flex:none; }
  .pal .empty { padding:10px 12px; color:var(--muted); font-style:italic; }

  /* ---- Help modal (WS8) ---- */
  .modal.help { max-width:720px; width:680px; }
  .help .body { max-height:60vh; overflow-y:auto; }
  .helpcols { display:grid; grid-template-columns:1fr 1fr; gap:0 28px; }
  .help h3 { font-size:11px; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); margin:12px 0 6px; }
  .help table { border-collapse:collapse; width:100%; }
  .help td { padding:2px 0; font-size:12px; vertical-align:top; }
  .help td:first-child { width:46%; color:var(--muted); }
  .key { background:var(--bg); border:1px solid var(--line); border-radius:4px; padding:0 5px;
    font-size:11px; display:inline-block; margin:1px 2px 1px 0; }

  /* ---- Update banner (WS8) ---- */
  #banner { display:none; position:fixed; top:0; left:220px; right:0; z-index:7; background:var(--chrome-focus);
    color:#e8e8e8; font-size:12px; padding:6px 12px; align-items:center; gap:10px;
    border-bottom:1px solid var(--accent); }
  #banner.show { display:flex; }
  #banner .x { margin-left:auto; cursor:pointer; color:var(--muted); }
  #banner .x:hover { color:var(--err); }

  /* ---- Status bar extras (WS8) ---- */
  #mode { color:var(--warn); font-weight:600; }
  #modehint { color:var(--muted); }
  #zoomind { color:var(--accent); cursor:pointer; display:none; }
  #palhint { margin-left:auto; color:var(--muted); cursor:pointer; }
  #palhint:hover { color:var(--accent); }
  #gear { cursor:pointer; font-size:13px; }
  #gear:hover { color:var(--accent); }

  /* ---- Drag-reorder (tabs + workspaces) ---- */
  .dropbar { position:absolute; background:var(--accent); z-index:5; pointer-events:none; border-radius:1px; }
  .dropbar.h { top:3px; bottom:3px; width:2px; }
  .dropbar.v { left:4px; right:4px; height:2px; }
  #tabbar .tab.dragging, #ws-list li.ws.dragging { opacity:.4; }
  body.grabbing, body.grabbing * { cursor:grabbing !important; }

  /* ---- Settings modal + worktree dialogs (WS8 chrome) ---- */
  .modal .errline { color:var(--err); font-size:11px; margin-top:8px; min-height:14px; }
  .modal.settings { width:560px; }
  .settings .body { max-height:62vh; overflow-y:auto; }
  .settings h3 { font-size:11px; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); margin:14px 0 6px; }
  .settings h3:first-child { margin-top:0; }
  .settings .row { display:flex; align-items:center; gap:8px; margin:3px 0; }
  .settings .row label { flex:none; width:110px; color:var(--muted); font-size:12px; }
  .settings .row input[type=text] { flex:1; }
  .settings .row input[type=color] { flex:none; width:30px; height:22px; padding:0 2px;
    background:var(--bg); border:1px solid var(--line); border-radius:4px; cursor:pointer; }
  .settings .row .ro { font-size:12px; color:var(--fg); overflow:hidden; text-overflow:ellipsis; }
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div id="brand">herdr</div>
    <section><h2>Workspaces</h2><ul id="ws-list"></ul></section>
    <section><h2>Panes</h2><ul id="pane-list"></ul></section>
    <section><h2>Agents</h2><ul id="agent-list"><li class="empty">none</li></ul></section>
  </aside>
  <div id="main">
    <div id="tabbar"></div>
    <div id="panes"></div>
    <div id="statusbar">
      <span id="conn">connecting…</span>
      <span id="grid"></span>
      <span id="mode"></span>
      <span id="modehint"></span>
      <span id="zoomind" title="zoomed — click to unzoom">ZOOM ⤢</span>
      <span id="palhint" title="command palette (⌘K / Ctrl+Alt+K)">⌘K palette</span>
      <span id="gear" title="settings">⚙</span>
    </div>
  </div>
</div>
<div id="banner"></div>
<div id="toasts"></div>
<script>
(() => {
  const PV = 1, FONT_PX = 15, LINE = 1.25;
  const panesEl = document.getElementById("panes");
  const wsListEl = document.getElementById("ws-list");
  const paneListEl = document.getElementById("pane-list");
  const agentListEl = document.getElementById("agent-list");
  const tabbarEl = document.getElementById("tabbar");
  const connEl = document.getElementById("conn");
  const gridEl = document.getElementById("grid");
  const toastsEl = document.getElementById("toasts");
  const modeEl = document.getElementById("mode");
  const modeHintEl = document.getElementById("modehint");
  const zoomIndEl = document.getElementById("zoomind");
  const palHintEl = document.getElementById("palhint");
  const gearEl = document.getElementById("gear");
  const bannerEl = document.getElementById("banner");
  const dpr = window.devicePixelRatio || 1;
  const measureCtx = document.createElement("canvas").getContext("2d");

  // Theme defaults used when a packed color is 0 (frame defaults unknown).
  const THEME_FG = 0xd4d4d4, THEME_BG = 0x181818;

  // ratatui Modifier bits (cell.m).
  const M_BOLD = 0x1, M_DIM = 0x2, M_ITALIC = 0x4, M_UNDERLINED = 0x8, M_REVERSED = 0x40, M_HIDDEN = 0x80;

  // Translucent wash for a browser-local drag selection (non-mouse panes, §7 read).
  const SEL_FILL = "rgba(88,148,255,0.32)";
  // Outline for the keyboard copy-mode cursor (hjkl/arrows), distinct from the wash.
  const CM_CURSOR = "rgba(120,170,255,0.95)";

  let ws = null, cellW = 9, cellH = 19, cols = 0, rows = 0;
  let layoutMsg = null;          // last layout message
  const panes = new Map();       // pane id -> pane state
  let copyModePane = null;       // the pane in keyboard copy-mode, or null
  let agentItems = [];           // last agents rollup (drives sidebar + workspace summaries)

  function measure() {
    measureCtx.font = `${FONT_PX}px ui-monospace, Menlo, monospace`;
    cellW = Math.max(1, Math.round(measureCtx.measureText("M").width * 100) / 100);
    cellH = Math.ceil(FONT_PX * LINE);
  }

  // The grid is the size of the #panes container (chrome is real HTML around
  // it), so the server's layout rects map straight onto it.
  function gridSize() {
    const w = panesEl.clientWidth || window.innerWidth;
    const h = panesEl.clientHeight || window.innerHeight;
    cols = Math.max(20, Math.floor(w / cellW));
    rows = Math.max(6, Math.floor(h / cellH));
  }

  // ---- Packed u32 colors (D2): 0x02_RR_GG_BB → CSS ----
  function rgbOf(v) { return [(v >> 16) & 255, (v >> 8) & 255, v & 255]; }
  function css(v) { const [r, g, b] = rgbOf(v); return `rgb(${r},${g},${b})`; }
  function blend(a, b, t) { // mix packed a toward packed b
    const pa = rgbOf(a), pb = rgbOf(b);
    return `rgb(${Math.round(pa[0] + (pb[0] - pa[0]) * t)},${Math.round(pa[1] + (pb[1] - pa[1]) * t)},${Math.round(pa[2] + (pb[2] - pa[2]) * t)})`;
  }

  function newPane(id) {
    const el = document.createElement("div");
    el.className = "pane";
    const chrome = document.createElement("div");
    chrome.className = "chrome";
    const info = document.createElement("div");
    info.className = "info";
    const ctl = document.createElement("div");
    ctl.className = "ctl";
    ctl.appendChild(mkBtn("⊟", "split left/right", "", () => sendCmd("pane.split", { pane: id, direction: "h" })));
    ctl.appendChild(mkBtn("⊞", "split top/bottom", "", () => sendCmd("pane.split", { pane: id, direction: "v" })));
    ctl.appendChild(mkBtn("⤢", "toggle zoom", "", () => sendCmd("pane.zoom", { pane: id })));
    ctl.appendChild(mkBtn("⬚", "copy mode (keyboard select)", "", () => enterCopyMode(id)));
    ctl.appendChild(mkBtn("⧉", "copy scrollback to clipboard", "", () => copyScrollback(id)));
    ctl.appendChild(mkBtn("✎", "rename pane", "", () => renamePane(id)));
    ctl.appendChild(mkBtn("✕", "close pane", "close", () => sendCmd("pane.close", { pane: id })));
    chrome.appendChild(info); chrome.appendChild(ctl);
    const canvas = document.createElement("canvas");
    el.appendChild(chrome); el.appendChild(canvas);
    panesEl.appendChild(el);
    const p = { id, el, chrome, chromeInfo: info, canvas, ctx: canvas.getContext("2d", { alpha: false }),
      pub: "", info: null, W: 0, H: 0, cells: [], links: [], cur: null,
      defFg: THEME_FG, defBg: THEME_BG, modes: { mouse: false, alt: false },
      title: "", cwd: "", agent: "", agentState: "", exited: null,
      pressed: -1, lastCell: "", dirty: false, scroll: null, sel: null, cm: null };
    // Clicking the header (not its buttons) focuses the pane; double-click
    // renames, right-click opens the pane menu (chrome or canvas).
    chrome.addEventListener("mousedown", () => { if (p.info && !p.info.focused) sendCmd("pane.focus", { pane: id }); });
    chrome.addEventListener("dblclick", () => renamePane(id));
    chrome.addEventListener("contextmenu", (e) => { e.preventDefault(); openCtx(e.clientX, e.clientY, paneMenuItems(id)); });
    attachMouse(p);
    panes.set(id, p);
    return p;
  }

  function mkBtn(label, title, cls, fn) {
    const b = document.createElement("button");
    b.textContent = label; b.title = title; if (cls) b.className = cls;
    b.addEventListener("mousedown", (e) => e.stopPropagation());
    b.addEventListener("click", (e) => { e.stopPropagation(); e.preventDefault(); fn(); });
    return b;
  }

  function pane(id) { return panes.get(id) || newPane(id); }

  // ---- Layout (D3): position pane DOM from computed rects + render chrome ----
  function applyLayout(msg) {
    layoutMsg = msg;
    const seen = new Set();
    for (const pr of msg.panes) {
      const p = pane(pr.pane);
      seen.add(pr.pane);
      p.pub = pr.pub; p.info = pr;
      const [rx, ry, rw, rh] = pr.rect, [ix, iy, iw, ih] = pr.inner;
      p.el.style.left = (rx * cellW) + "px";
      p.el.style.top = (ry * cellH) + "px";
      p.el.style.width = (rw * cellW) + "px";
      p.el.style.height = (rh * cellH) + "px";
      p.el.classList.toggle("focused", !!pr.focused);
      p.chrome.style.height = ((iy - ry) * cellH) + "px";
      p.canvas.style.left = ((ix - rx) * cellW) + "px";
      p.canvas.style.top = ((iy - ry) * cellH) + "px";
      p.canvas.style.width = (iw * cellW) + "px";
      p.canvas.style.height = (ih * cellH) + "px";
      p.canvas.width = Math.floor(iw * cellW * dpr);
      p.canvas.height = Math.floor(ih * cellH * dpr);
      p.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      renderChrome(p);
      scheduleDraw(p);
    }
    for (const [id, p] of panes) {
      if (!seen.has(id)) {
        if (p === copyModePane) exitCopyMode();
        p.el.remove(); panes.delete(id);
      }
    }
    renderWorkspaces(msg);
    renderPaneList(msg);
    renderTabbar(msg);
    renderBorders(msg);
    renderStatusExtras(msg);
  }

  // ---- Split resize handles (WS8): draggable borders → pane.resize_border ----
  // Each border div covers a thin halo around the split line; dragging maps the
  // pointer back to the split's first-child ratio. The server rebroadcasts the
  // layout on every resize, recreating these divs — the drag survives because
  // its listeners live on window and the border's id/area are stable.
  function renderBorders(msg) {
    for (const el of panesEl.querySelectorAll(".split")) el.remove();
    const HIT = 5; // px grab halo each side of the line
    for (const b of (msg.borders || [])) {
      const el = document.createElement("div");
      el.className = "split " + (b.dir === 0 ? "h" : "v");
      const [ax, ay, aw, ah] = b.area;
      if (b.dir === 0) { // horizontal split: vertical divider at x = pos
        el.style.left = (b.pos * cellW - HIT) + "px";
        el.style.top = (ay * cellH) + "px";
        el.style.width = (2 * HIT) + "px";
        el.style.height = (ah * cellH) + "px";
      } else {           // vertical split: horizontal divider at y = pos
        el.style.top = (b.pos * cellH - HIT) + "px";
        el.style.left = (ax * cellW) + "px";
        el.style.height = (2 * HIT) + "px";
        el.style.width = (aw * cellW) + "px";
      }
      el.addEventListener("mousedown", (e) => beginBorderDrag(e, b, el));
      panesEl.appendChild(el);
    }
  }

  function beginBorderDrag(e, b, el) {
    if (e.button !== 0) return;
    e.preventDefault();
    el.classList.add("dragging");
    let sent = b.ratio;
    const move = (ev) => {
      const r = panesEl.getBoundingClientRect();
      let ratio;
      if (b.dir === 0) ratio = ((ev.clientX - r.left) / cellW - b.area[0]) / b.area[2];
      else ratio = ((ev.clientY - r.top) / cellH - b.area[1]) / b.area[3];
      ratio = Math.min(0.9, Math.max(0.1, ratio));
      if (Math.abs(ratio - sent) < 0.01) return; // ~one resize per cell of travel
      sent = ratio;
      sendCmd("pane.resize_border", { border: b.id, ratio });
    };
    const up = () => {
      window.removeEventListener("mousemove", move);
      window.removeEventListener("mouseup", up);
      for (const d of panesEl.querySelectorAll(".split.dragging")) d.classList.remove("dragging");
    };
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", up);
  }

  // ---- Status bar extras (WS8): zoom indicator + focused-pane info ----
  function renderStatusExtras(msg) {
    const zoomed = msg.tabs.some((t) => t.active && t.zoomed);
    zoomIndEl.style.display = zoomed ? "" : "none";
  }

  // ---- Chrome: per-pane header (styled HTML, WS8) ----
  function renderChrome(p) {
    p.chromeInfo.innerHTML = "";
    const add = (cls, text) => {
      const s = document.createElement("span");
      if (cls) s.className = cls;
      s.textContent = text;
      p.chromeInfo.appendChild(s);
    };
    add("pub", p.pub || ("#" + p.id));
    if (p.title) add("", "  " + p.title);
    if (p.cwd) add("", "  " + p.cwd);
    if (p.agent) add("agent", "  " + p.agent + ":" + p.agentState);
    if (p.exited !== null) add("exited", "  exited (" + p.exited + ")");
  }

  // ---- Sidebar (WS8) ----
  function stClass(state) {
    return state === "working" ? "st-working" : state === "blocked" ? "st-blocked"
      : state === "idle" ? "st-idle" : "st-unknown";
  }

  // workspaceSummary compresses a workspace's detected-agent states into a
  // compact badge ("●1 ●2" colored by state), computed client-side from the
  // agents rollup — the server's per-item workspace field keys the grouping.
  function workspaceSummary(wsId) {
    const counts = { blocked: 0, working: 0, idle: 0 };
    for (const it of agentItems) {
      if (it.workspace === wsId && counts[it.state] !== undefined) counts[it.state]++;
    }
    const frag = document.createDocumentFragment();
    for (const st of ["blocked", "working", "idle"]) {
      if (!counts[st]) continue;
      const s = document.createElement("span");
      s.className = stClass(st);
      s.textContent = "●" + counts[st];
      s.title = counts[st] + " " + st;
      frag.appendChild(s);
    }
    return frag.childNodes.length ? frag : null;
  }

  function renderWorkspaces(msg) {
    wsListEl.innerHTML = "";
    for (const w of msg.workspaces) {
      const li = document.createElement("li");
      li.className = "ws" + (w.active ? " active" : "");
      const name = document.createElement("span");
      name.textContent = (w.active ? "● " : "○ ") + w.name;
      li.appendChild(name);
      const sum = workspaceSummary(w.id);
      if (sum) {
        const s = document.createElement("span"); s.className = "sum"; s.appendChild(sum);
        li.appendChild(s);
      }
      li.addEventListener("click", () => { if (!dragConsumedClick && !w.active) sendCmd("workspace.focus", { id: w.id }); });
      li.addEventListener("dblclick", () => renameWorkspace(w));
      li.addEventListener("contextmenu", (e) => { e.preventDefault(); openCtx(e.clientX, e.clientY, wsMenuItems(w)); });
      li.addEventListener("mousedown", (e) => beginReorderDrag(e, {
        el: li, container: wsListEl, itemSel: "li.ws", horizontal: false,
        onDrop: (gap) => sendCmd("workspace.move", { id: w.id, index: gap }),
      }));
      wsListEl.appendChild(li);
    }
    const add = document.createElement("li");
    add.className = "add"; add.textContent = "+ workspace"; add.title = "new workspace";
    add.addEventListener("click", () => sendCmd("workspace.create", {}));
    wsListEl.appendChild(add);
  }

  function renderPaneList(msg) {
    paneListEl.innerHTML = "";
    for (const pr of msg.panes) {
      const p = panes.get(pr.pane);
      const li = document.createElement("li");
      li.className = "pn" + (pr.focused ? " focused" : "");
      const dot = document.createElement("span"); dot.className = "dot"; dot.textContent = pr.focused ? "▸" : "";
      const pub = document.createElement("span"); pub.className = "pub"; pub.textContent = pr.pub || ("#" + pr.pane);
      li.appendChild(dot); li.appendChild(pub);
      if (p && p.title) { const t = document.createElement("span"); t.className = "ttl"; t.textContent = p.title; li.appendChild(t); }
      if (p && p.agent) {
        const a = document.createElement("span"); a.className = "ag " + stClass(p.agentState); a.textContent = p.agent;
        li.appendChild(a);
      }
      li.addEventListener("click", () => { if (!pr.focused) sendCmd("pane.focus", { pane: pr.pane }); });
      paneListEl.appendChild(li);
    }
  }

  function renderTabbar(msg) {
    tabbarEl.innerHTML = "";
    for (const t of msg.tabs) {
      const el = document.createElement("div");
      el.className = "tab" + (t.active ? " active" : "");
      const label = document.createElement("span");
      label.textContent = t.name + (t.zoomed ? " ⤢" : "");
      el.appendChild(label);
      el.addEventListener("click", () => { if (!dragConsumedClick && !t.active) sendCmd("tab.focus", { num: t.num }); });
      el.addEventListener("dblclick", () => renameTab(t));
      el.addEventListener("contextmenu", (e) => { e.preventDefault(); openCtx(e.clientX, e.clientY, tabMenuItems(t, msg.tabs.length)); });
      el.addEventListener("mousedown", (e) => {
        if (e.target.classList.contains("x")) return; // the close button is not a drag handle
        beginReorderDrag(e, {
          el, container: tabbarEl, itemSel: ".tab:not(.add)", horizontal: true,
          onDrop: (gap) => sendCmd("tab.move", { num: t.num, index: gap }),
        });
      });
      if (msg.tabs.length > 1) {
        const x = document.createElement("span");
        x.className = "x"; x.textContent = "✕"; x.title = "close tab";
        x.addEventListener("click", (e) => { e.stopPropagation(); sendCmd("tab.close", { num: t.num }); });
        el.appendChild(x);
      }
      tabbarEl.appendChild(el);
    }
    const add = document.createElement("div");
    add.className = "tab add"; add.textContent = "+"; add.title = "new tab";
    add.addEventListener("click", () => sendCmd("tab.create", {}));
    tabbarEl.appendChild(add);
    // Overflow: keep the active tab in view when the bar scrolls horizontally.
    const act = tabbarEl.querySelector(".tab.active");
    if (act && act.scrollIntoView) act.scrollIntoView({ inline: "nearest", block: "nearest" });
  }
  // A vertical wheel over the tab bar scrolls it horizontally (overflow).
  tabbarEl.addEventListener("wheel", (e) => {
    if (!e.deltaY) return;
    e.preventDefault();
    tabbarEl.scrollLeft += e.deltaY;
  }, { passive: false });

  // ---- Drag-reorder (WS8): tabs (horizontal) + workspaces (vertical) ----
  //
  // Same shape as beginBorderDrag: mousedown arms a potential drag with
  // window-level move/up listeners, and only ~4px of travel makes it one — a
  // plain press stays a click (focus). While dragging, the pointer maps to an
  // insertion gap (0..=len, the tab.move / workspace.move convention) shown as
  // a 2px accent bar; drop sends the move and the server's layout rebroadcast
  // re-renders both lists (the server is the source of truth).
  // dragConsumedClick suppresses the click that follows a completed drag so it
  // doesn't also focus; it self-clears on the next tick.
  let dragConsumedClick = false;
  function beginReorderDrag(ev, cfg) {
    if (ev.button !== 0) return;
    const sx = ev.clientX, sy = ev.clientY;
    let dragging = false, bar = null, gap = -1;
    const items = () => Array.from(cfg.container.querySelectorAll(cfg.itemSel));
    const move = (e) => {
      if (!dragging) {
        if (Math.abs(e.clientX - sx) < 4 && Math.abs(e.clientY - sy) < 4) return;
        dragging = true;
        cfg.el.classList.add("dragging");
        document.body.classList.add("grabbing");
        bar = document.createElement("div");
        bar.className = "dropbar " + (cfg.horizontal ? "h" : "v");
      }
      // A mid-drag re-render replaces the container's children (and drops the
      // bar); re-query and re-attach every move so the drag survives it.
      if (!bar.isConnected) cfg.container.appendChild(bar);
      const els = items();
      gap = els.length;
      for (let i = 0; i < els.length; i++) {
        const r = els[i].getBoundingClientRect();
        const mid = cfg.horizontal ? r.left + r.width / 2 : r.top + r.height / 2;
        if ((cfg.horizontal ? e.clientX : e.clientY) < mid) { gap = i; break; }
      }
      const cr = cfg.container.getBoundingClientRect();
      const edge = gap < els.length
        ? els[gap].getBoundingClientRect()[cfg.horizontal ? "left" : "top"]
        : (els.length ? els[els.length - 1].getBoundingClientRect()[cfg.horizontal ? "right" : "bottom"]
                      : (cfg.horizontal ? cr.left : cr.top));
      if (cfg.horizontal) bar.style.left = (edge - cr.left + cfg.container.scrollLeft - 1) + "px";
      else bar.style.top = (edge - cr.top + cfg.container.scrollTop - 1) + "px";
    };
    const up = () => {
      window.removeEventListener("mousemove", move);
      window.removeEventListener("mouseup", up);
      cfg.el.classList.remove("dragging");
      document.body.classList.remove("grabbing");
      if (bar) bar.remove();
      if (dragging && gap >= 0) {
        dragConsumedClick = true;
        setTimeout(() => { dragConsumedClick = false; }, 0); // the click fires first, synchronously
        cfg.onDrop(gap);
      }
    };
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", up);
  }

  // ---- Agents rollup (WS8): the `agents` message, previously dropped ----
  function renderAgents(items) {
    agentItems = items || [];
    if (layoutMsg) renderWorkspaces(layoutMsg); // workspace badges derive from the rollup
    agentListEl.innerHTML = "";
    if (!items || !items.length) {
      const li = document.createElement("li"); li.className = "empty"; li.textContent = "none";
      agentListEl.appendChild(li); return;
    }
    for (const it of items) {
      const li = document.createElement("li"); li.className = "agent";
      const dot = document.createElement("span"); dot.className = "adot " + stClass(it.state); dot.textContent = "●";
      const name = document.createElement("span"); name.className = "aname"; name.textContent = it.agent;
      const meta = document.createElement("span"); meta.className = "ameta";
      meta.textContent = (it.pub || ("#" + it.pane)) + " · " + (it.seen ? it.state : "done");
      li.appendChild(dot); li.appendChild(name); li.appendChild(meta);
      li.addEventListener("click", () => sendCmd("pane.focus", { pane: it.pane }));
      agentListEl.appendChild(li);
    }
  }

  // Refresh the sidebar pane list when a pane's title/agent changed out of band.
  function refreshPaneList() { if (layoutMsg) renderPaneList(layoutMsg); }

  // ---- Rendering ----
  function scheduleDraw(p) {
    if (p.dirty) return;
    p.dirty = true;
    requestAnimationFrame(() => { p.dirty = false; draw(p); });
  }

  function draw(p) {
    const ctx = p.ctx;
    const defFg = p.defFg || THEME_FG, defBg = p.defBg || THEME_BG;
    ctx.fillStyle = css(defBg);
    ctx.fillRect(0, 0, p.W * cellW + cellW, p.H * cellH + cellH);
    ctx.textBaseline = "top";
    for (let y = 0; y < p.H; y++) {
      for (let x = 0; x < p.W; x++) {
        const c = p.cells[y * p.W + x];
        if (!c) continue;
        const m = c.m || 0;
        let fg = c.f || defFg, bg = c.b || defBg;
        if (m & M_REVERSED) { const t = fg; fg = bg; bg = t; }
        const px = x * cellW, py = y * cellH;
        if (bg !== defBg) { ctx.fillStyle = css(bg); ctx.fillRect(px, py, cellW + 0.5, cellH + 0.5); }
        const ch = c.s;
        if (ch && ch !== " " && !(m & M_HIDDEN)) {
          let font = "";
          if (m & M_BOLD) font += "bold ";
          if (m & M_ITALIC) font += "italic ";
          ctx.font = `${font}${FONT_PX}px ui-monospace, Menlo, monospace`;
          ctx.fillStyle = (m & M_DIM) ? blend(fg, bg, 0.5) : css(fg);
          ctx.fillText(ch, px, py + 1);
          if ((m & M_UNDERLINED) || c.h) ctx.fillRect(px, py + cellH - 2, cellW, 1);
        }
      }
    }
    if (p.cur && p.cur.vis && p.info && p.info.focused) {
      ctx.fillStyle = css(defFg); ctx.globalAlpha = 0.7;
      ctx.fillRect(p.cur.x * cellW, p.cur.y * cellH, cellW, cellH);
      ctx.globalAlpha = 1;
    }
    if (p.sel) drawSelection(p, ctx);
    if (p.cm) drawCopyCursor(p, ctx);
    if (hasScrollbar(p)) drawScrollbar(p, ctx);
  }

  // ---- Scrollback scrollbar (WS8): drawn on the pane's right edge whenever
  // history exists (alt-screen panes scroll in-app, not in the buffer). The
  // thumb brightens while scrolled up; dragging it is wired in attachMouse.
  const SB_W = 6; // px
  function hasScrollbar(p) {
    return p.scroll && p.scroll.max > 0 && !(p.modes && p.modes.alt);
  }
  function drawScrollbar(p, ctx) {
    const vw = p.W * cellW, vh = p.H * cellH;
    const total = p.scroll.max + p.scroll.rows;
    const h = Math.max(20, vh * p.scroll.rows / total);
    const span = vh - h; // travel available to the thumb
    const top = total > p.scroll.rows ? span * (p.scroll.max - p.scroll.off) / p.scroll.max : 0;
    ctx.fillStyle = "rgba(255,255,255,0.07)";
    ctx.fillRect(vw - SB_W, 0, SB_W, vh);
    ctx.fillStyle = p.scroll.off ? "rgba(120,170,255,0.6)" : "rgba(255,255,255,0.25)";
    ctx.fillRect(vw - SB_W, top, SB_W, h);
  }

  // drawCopyCursor outlines the keyboard copy-mode cursor cell (the wash, if a
  // selection is anchored, is drawn by drawSelection via p.sel).
  function drawCopyCursor(p, ctx) {
    const { x, y } = p.cm.cursor;
    ctx.save();
    ctx.strokeStyle = CM_CURSOR; ctx.lineWidth = 2;
    ctx.strokeRect(x * cellW + 1, y * cellH + 1, cellW - 2, cellH - 2);
    ctx.restore();
  }

  // drawSelection washes the pane-local drag range (viewport cells). Linear mode
  // fills reading-order spans (first row from anchor, full middle rows, last row
  // to cursor); rect mode fills the bounding box. Endpoints are inclusive, matching
  // the server's read extraction.
  function drawSelection(p, ctx) {
    let a = p.sel.anchor, b = p.sel.cursor;
    if (b.y < a.y || (b.y === a.y && b.x < a.x)) { const t = a; a = b; b = t; }
    ctx.fillStyle = SEL_FILL;
    if (p.sel.rect) {
      const x0 = Math.min(a.x, b.x), x1 = Math.max(a.x, b.x);
      ctx.fillRect(x0 * cellW, a.y * cellH, (x1 - x0 + 1) * cellW, (b.y - a.y + 1) * cellH);
      return;
    }
    for (let y = a.y; y <= b.y; y++) {
      const sx = (y === a.y) ? a.x : 0;
      const ex = (y === b.y) ? b.x : p.W - 1;
      ctx.fillRect(sx * cellW, y * cellH, (ex - sx + 1) * cellW, cellH);
    }
  }

  // ---- Down messages ----
  function onMessage(msg) {
    switch (msg.t) {
      case "welcome":
        if (msg.error) setStatus("rejected: " + msg.error, true);
        else setStatus("connected");
        break;
      case "layout": applyLayout(msg); break;
      case "pane_frame": {
        const p = pane(msg.pane);
        p.W = msg.w; p.H = msg.h; p.cells = msg.cells; p.links = msg.links || [];
        p.cur = msg.cur || null; p.defFg = msg.def_fg; p.defBg = msg.def_bg;
        p.scroll = msg.scroll || null;
        scheduleDraw(p); break;
      }
      case "pane_diff": {
        const p = pane(msg.pane);
        if (msg.cells) for (const dc of msg.cells) p.cells[dc.i] = dc;
        if (msg.cur) p.cur = msg.cur;
        // Every frame carries current scroll, absent ⇒ no scrollback: reset, don't
        // retain (a stale max misplaces read coords after the buffer shrinks, e.g. clear).
        p.scroll = msg.scroll || null;
        scheduleDraw(p); break;
      }
      case "pane_title": { const p = pane(msg.pane); p.title = msg.title; renderChrome(p); refreshPaneList(); break; }
      case "pane_cwd": { const p = pane(msg.pane); p.cwd = msg.cwd; renderChrome(p); break; }
      case "pane_agent": {
        const p = pane(msg.pane); p.agent = msg.agent; p.agentState = msg.state;
        renderChrome(p); refreshPaneList(); break;
      }
      case "pane_modes": {
        const p = pane(msg.pane); p.modes = { mouse: !!msg.mouse, alt: !!msg.alt_screen };
        break;
      }
      case "pane_exited": { const p = pane(msg.pane); p.exited = msg.code; renderChrome(p); break; }
      case "agents": renderAgents(msg.items); break;
      case "clipboard":
        try { navigator.clipboard.writeText(b64decode(msg.data)); } catch (e) {}
        break;
      case "notify": handleNotify(msg); break;
      case "title": document.title = msg.title ? ("herdr · " + msg.title) : "herdr"; break;
      case "update_ready":
        showBanner("herdr update ready" + (msg.version ? " — " + msg.version : "") +
          (msg.command ? " · run: " + msg.command : ""));
        break;
      case "error": toast("error: " + msg.msg); break;
      case "shutdown": setStatus("server shut down", true); break;
      case "cmd_result": {
        const cb = cmdCbs.get(msg.id);
        if (cb) { cmdCbs.delete(msg.id); cb(msg); }
        else if (!msg.ok) toast("cmd failed: " + (msg.error || "unknown"));
        break;
      }
    }
  }

  function b64decode(s) {
    try { return decodeURIComponent(escape(atob(s))); } catch (e) { return atob(s); }
  }

  // ---- Send helpers ----
  function sendMsg(m) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(m)); }
  function sendCmd(name, params) { sendMsg({ t: "cmd", name, params }); }

  // sendCmdAwait issues a command under a fresh id and resolves cb with its
  // cmd_result (read/capture and the §7 query commands carry result data).
  let cmdSeq = 0;
  const cmdCbs = new Map();
  function sendCmdAwait(name, params, cb) {
    const id = "b" + (++cmdSeq);
    cmdCbs.set(id, cb);
    sendMsg({ t: "cmd", id, name, params });
  }

  // ---- Keyboard (D4: structured, never pre-encoded) ----
  function mods(e) {
    return (e.shiftKey ? 1 : 0) | (e.altKey ? 2 : 0) | (e.ctrlKey ? 4 : 0) | (e.metaKey ? 8 : 0);
  }

  function onKey(e) {
    // An open dialog/menu/palette owns the keyboard: its own listeners handle
    // Enter/arrows, Escape falls through to here, and nothing reaches the PTY.
    if (uiOpen()) {
      if (e.type === "keydown" && e.key === "Escape") { e.preventDefault(); closeCtx(); closeModal(); }
      return;
    }
    // Copy-mode captures the keyboard entirely — motions/yank, nothing to the PTY.
    if (copyModePane) {
      e.preventDefault();
      if (e.type === "keydown") copyModeKey(copyModePane, e);
      return;
    }
    // ⌘K (mac) / Ctrl+Alt+K opens the command palette / navigator.
    if (e.type === "keydown" && e.code === "KeyK" &&
        ((e.metaKey && !e.ctrlKey) || (e.ctrlKey && e.altKey))) {
      e.preventDefault(); openPalette(); return;
    }
    const isV = e.key === "v" || e.key === "V";
    if (e.type === "keydown" && e.metaKey && !e.ctrlKey && isV) { e.preventDefault(); pasteText(); return; }
    if (e.metaKey && !e.ctrlKey) return;  // leave other Cmd shortcuts to the browser
    if (e.code === "F12") return;         // devtools
    e.preventDefault();
    // Typing to the terminal dismisses a lingering (stale) copy wash.
    if (e.type === "keydown") clearStaleSelections();
    const kind = e.type === "keyup" ? "u" : (e.repeat ? "r" : "d");
    sendMsg({ t: "key", code: e.code, key: e.key, mods: mods(e), kind });
  }
  window.addEventListener("keydown", onKey);
  window.addEventListener("keyup", onKey);

  // ---- Paste ----
  function pasteText() {
    if (!navigator.clipboard || !navigator.clipboard.readText) { toast("clipboard read unavailable"); return; }
    navigator.clipboard.readText()
      .then((t) => { if (t) sendMsg({ t: "paste", data: t }); else toast("clipboard has no text"); })
      .catch((err) => toast("paste blocked: " + ((err && err.name) || err)));
  }
  document.addEventListener("paste", (e) => {
    const text = (e.clipboardData || window.clipboardData).getData("text");
    if (text) { e.preventDefault(); sendMsg({ t: "paste", data: text }); }
  });

  // ---- Mouse (structured cell coords; server applies the pane's encoding) ----
  function cellOf(p, ev) {
    const r = p.canvas.getBoundingClientRect();
    const x = Math.min(Math.max(0, Math.floor((ev.clientX - r.left) / cellW)), Math.max(0, p.W - 1));
    const y = Math.min(Math.max(0, Math.floor((ev.clientY - r.top) / cellH)), Math.max(0, p.H - 1));
    return [x, y];
  }

  function sendMouse(p, kind, btn, ev, dx, dy) {
    const [x, y] = cellOf(p, ev);
    const m = { t: "mouse", pane: p.id, x, y, btn, kind, mods: mods(ev) };
    if (dx) m.dx = dx;
    if (dy) m.dy = dy;
    sendMsg(m);
  }

  // absPoint maps a viewport cell {x,y} to the [row, col] the server's read wants:
  // absolute screen-buffer coordinates from the top of scrollback. The frame's
  // scroll gives the history above the viewport (max) and how far it is scrolled up
  // (off), so the top visible row is (max - off). No scroll info ⇒ no scrollback.
  function absPoint(p, cell) {
    const off = p.scroll ? p.scroll.off : 0;
    const max = p.scroll ? p.scroll.max : 0;
    return [max - off + cell.y, cell.x];
  }

  // readAndCopy issues a §7 read over a viewport cell range and writes the
  // extracted text to the clipboard. Endpoints are inclusive viewport cells,
  // mapped to absolute buffer coords; rect selects a block. Shared by the mouse
  // drag path and keyboard copy-mode.
  function readAndCopy(p, aCell, bCell, rect) {
    sendCmdAwait("read", {
      pane: p.id, anchor: absPoint(p, aCell), cursor: absPoint(p, bCell), rect,
    }, (res) => {
      if (!res.ok) { toast("read failed: " + (res.error || "unknown")); return; }
      const text = res.data && res.data.text;
      if (!text) { toast("selection is empty"); return; }
      navigator.clipboard.writeText(text).then(
        () => toast("copied " + text.length + " char" + (text.length === 1 ? "" : "s")),
        () => toast("clipboard write blocked"));
    });
  }

  // finishSelection copies the pane's completed drag range, marking the wash done
  // so a later keystroke (clearStaleSelections) dismisses the now-stale highlight.
  function finishSelection(p) {
    readAndCopy(p, p.sel.anchor, p.sel.cursor, p.sel.rect);
    p.sel.done = true;
  }

  // copyScrollback captures the pane's whole buffer (§7 capture, soft-wraps
  // rejoined) and copies it — the chrome ⧉ button, distinct from a range read.
  function copyScrollback(id) {
    const p = panes.get(id);
    if (!p) return;
    sendCmdAwait("capture", { pane: id, scope: 1, lines: 0, unwrap: true }, (res) => {
      if (!res.ok) { toast("capture failed: " + (res.error || "unknown")); return; }
      const text = res.data && res.data.text;
      if (!text) { toast("nothing to copy"); return; }
      navigator.clipboard.writeText(text).then(
        () => toast("copied " + text.length + " chars (scrollback)"),
        () => toast("clipboard write blocked"));
    });
  }

  // clearStaleSelections drops any completed drag wash (p.sel.done) — a fixed
  // viewport highlight goes stale once new output or the cursor moves, so the
  // next keystroke to the terminal dismisses it. Active drags are left alone.
  function clearStaleSelections() {
    for (const p of panes.values()) {
      if (p.sel && p.sel.done) { p.sel = null; scheduleDraw(p); }
    }
  }

  // ---- Keyboard copy-mode (§7 read via hjkl/arrows, no mouse needed) ----
  //
  // A tmux-style selection driven from the keyboard: enter on a pane, move the
  // cursor, press v to begin selecting, y/Enter to yank into the clipboard, Esc
  // to leave. Motions operate on viewport cells; k/j past the top/bottom scroll
  // the pane so the selection can reach into scrollback.

  function enterCopyMode(id) {
    const p = panes.get(id);
    if (!p) return;
    sendCmd("pane.focus", { pane: id });
    exitCopyMode(); // only one pane at a time
    const start = (p.cur && p.cur.vis) ? { x: p.cur.x, y: p.cur.y } : { x: 0, y: 0 };
    p.cm = { cursor: start, anchor: null, rect: false };
    copyModePane = p;
    p.sel = null;
    setModeBar("COPY " + (p.pub || "#" + p.id), "hjkl/arrows move · v select · r rect · y copy · Esc exit");
    scheduleDraw(p);
  }

  function exitCopyMode() {
    const p = copyModePane;
    copyModePane = null;
    setModeBar("", "");
    if (!p) return;
    p.cm = null; p.sel = null;
    scheduleDraw(p);
  }

  // setModeBar shows a persistent mode indicator + keybind hints in the status
  // bar (herdr's bottom mode bars) while a keyboard mode is active.
  function setModeBar(mode, hint) {
    modeEl.textContent = mode;
    modeHintEl.textContent = hint;
  }

  // cmSyncSel mirrors the copy-mode range onto p.sel so drawSelection washes it
  // (only once an anchor is set with v).
  function cmSyncSel(p) {
    const cm = p.cm;
    p.sel = cm.anchor ? { anchor: cm.anchor, cursor: cm.cursor, rect: cm.rect, moved: true } : null;
  }

  // Copy-mode keybindings. gateway injects window.__herdrKeys.copyMode
  // (action → [keys]) from the YAML config; this built-in table is the fallback
  // when the page is served standalone or the config omits copy_mode. We index it
  // as key → action so copyModeKey is a switch on the action, not the raw key.
  const COPY_MODE_DEFAULT = {
    "move-left": ["ArrowLeft", "h"], "move-right": ["ArrowRight", "l"],
    "move-up": ["ArrowUp", "k"], "move-down": ["ArrowDown", "j"],
    "line-start": ["0", "Home"], "line-end": ["$", "End"],
    "top": ["g"], "bottom": ["G"], "select": ["v"], "rect": ["r"],
    "yank": ["y", "Enter"], "exit": ["Escape", "q"],
  };
  const COPY_KEY = (() => {
    const table = (window.__herdrKeys && window.__herdrKeys.copyMode) || COPY_MODE_DEFAULT;
    const map = {};
    for (const action in table) for (const k of (table[action] || [])) map[k] = action;
    return map;
  })();

  // copyModeKey handles one keydown while in copy-mode; returns without touching
  // the terminal (onKey has already swallowed the event).
  function copyModeKey(p, e) {
    const cm = p.cm;
    if (!cm) return;
    const clampX = (x) => Math.min(Math.max(0, x), Math.max(0, p.W - 1));
    const clampY = (y) => Math.min(Math.max(0, y), Math.max(0, p.H - 1));
    const move = (dx, dy) => {
      let ny = cm.cursor.y + dy;
      if (ny < 0) { sendCmd("scroll", { pane: p.id, delta: -1 }); ny = 0; }
      else if (ny > p.H - 1) { sendCmd("scroll", { pane: p.id, delta: 1 }); ny = p.H - 1; }
      cm.cursor = { x: clampX(cm.cursor.x + dx), y: clampY(ny) };
    };
    switch (COPY_KEY[e.key]) {
      case "move-left": move(-1, 0); break;
      case "move-right": move(1, 0); break;
      case "move-up": move(0, -1); break;
      case "move-down": move(0, 1); break;
      case "line-start": cm.cursor = { x: 0, y: cm.cursor.y }; break;
      case "line-end": cm.cursor = { x: Math.max(0, p.W - 1), y: cm.cursor.y }; break;
      case "top": cm.cursor = { x: cm.cursor.x, y: 0 }; break;
      case "bottom": cm.cursor = { x: cm.cursor.x, y: Math.max(0, p.H - 1) }; break;
      case "select": cm.anchor = cm.anchor ? null : { x: cm.cursor.x, y: cm.cursor.y }; break;
      case "rect": cm.rect = !cm.rect; break;
      case "yank": copyModeYank(p); return;
      case "exit": exitCopyMode(); return;
      default: return; // unbound key: stay in copy-mode, do nothing
    }
    cmSyncSel(p);
    scheduleDraw(p);
  }

  // copyModeYank reads the current copy-mode range (anchor→cursor, or just the
  // cursor cell if nothing is anchored yet) into the clipboard, then exits.
  function copyModeYank(p) {
    const cm = p.cm;
    readAndCopy(p, cm.anchor || cm.cursor, cm.cursor, cm.rect);
    exitCopyMode();
  }

  // beginScrollDrag drags the pane's scrollbar thumb: each pointer move maps to
  // a target history offset and sends the delta (§7 scroll is relative). The
  // server's next frame updates p.scroll, keeping successive deltas honest.
  function beginScrollDrag(p, ev0) {
    let queued = false;
    const move = (ev) => {
      if (!hasScrollbar(p) || queued) return;
      queued = true;
      requestAnimationFrame(() => {
        queued = false;
        if (!hasScrollbar(p)) return;
        const r = p.canvas.getBoundingClientRect();
        const vh = p.H * cellH;
        const total = p.scroll.max + p.scroll.rows;
        const h = Math.max(20, vh * p.scroll.rows / total);
        const span = vh - h;
        if (span <= 0) return;
        const frac = Math.min(1, Math.max(0, (ev.clientY - r.top - h / 2) / span));
        const target = Math.round(p.scroll.max * (1 - frac));
        const delta = p.scroll.off - target; // positive = toward the live bottom
        if (delta) sendCmd("scroll", { pane: p.id, delta });
      });
    };
    const up = () => {
      window.removeEventListener("mousemove", move);
      window.removeEventListener("mouseup", up);
    };
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", up);
    move(ev0);
  }

  function attachMouse(p) {
    p.canvas.addEventListener("mousedown", (ev) => {
      if (copyModePane) exitCopyMode(); // a mouse drag supersedes keyboard copy-mode
      if (p.info && !p.info.focused) sendCmd("pane.focus", { pane: p.id });
      // The scrollbar strip owns left-drags whenever it is drawn.
      if (ev.button === 0 && hasScrollbar(p)) {
        const r = p.canvas.getBoundingClientRect();
        if (ev.clientX - r.left >= p.W * cellW - SB_W - 2) {
          ev.preventDefault();
          beginScrollDrag(p, ev);
          return;
        }
      }
      if (!p.modes.mouse) {
        // No capture: left-drag originates a browser-local selection (§7 read);
        // Alt makes it a rectangular block. A plain click (no drag) is resolved on
        // mouseup — hyperlink follow, per α.
        if (ev.button !== 0) return;
        ev.preventDefault();
        const [x, y] = cellOf(p, ev);
        p.sel = { anchor: { x, y }, cursor: { x, y }, rect: ev.altKey, moved: false };
        scheduleDraw(p);
        return;
      }
      if (ev.button > 2) return;
      ev.preventDefault();
      p.pressed = ev.button;
      sendMouse(p, "d", ev.button, ev);
    });
    window.addEventListener("mouseup", (ev) => {
      if (p.sel) {
        const sel = p.sel;
        if (sel.moved) {
          finishSelection(p);            // a real drag → read + copy, keep the wash
        } else {
          p.sel = null;                  // a click → follow a hyperlink under it
          scheduleDraw(p);
          const c = p.cells[sel.anchor.y * p.W + sel.anchor.x];
          if (c && c.h && p.links[c.h - 1]) window.open(p.links[c.h - 1], "_blank", "noopener");
        }
        return;
      }
      if (p.pressed < 0 || ev.button !== p.pressed) return;
      const btn = p.pressed;
      p.pressed = -1;
      if (p.modes.mouse) sendMouse(p, "u", btn, ev);
    });
    p.canvas.addEventListener("mousemove", (ev) => {
      if (p.sel) {
        const [x, y] = cellOf(p, ev);
        if (x === p.sel.cursor.x && y === p.sel.cursor.y) return; // one update per cell
        p.sel.cursor = { x, y };
        if (x !== p.sel.anchor.x || y !== p.sel.anchor.y) p.sel.moved = true;
        scheduleDraw(p);
        return;
      }
      if (!p.modes.mouse) return;
      const key = cellOf(p, ev).join(":");
      if (key === p.lastCell) return; // one report per cell
      p.lastCell = key;
      sendMouse(p, "m", p.pressed >= 0 ? p.pressed : 3, ev);
    });
    p.canvas.addEventListener("wheel", (ev) => {
      ev.preventDefault();
      const lines = ev.deltaMode === 1 ? Math.round(ev.deltaY)
        : Math.sign(ev.deltaY) * Math.max(1, Math.round(Math.abs(ev.deltaY) / cellH));
      if (!lines) return;
      if (p.modes.mouse || p.modes.alt) sendMouse(p, "w", 3, ev, 0, lines);
      else {
        if (p.sel) { p.sel = null; scheduleDraw(p); } // scrolling invalidates the fixed-viewport wash
        sendCmd("scroll", { pane: p.id, delta: lines });
      }
    }, { passive: false });
    // Right-click: mouse-capturing apps get the encoded button; otherwise the
    // pane menu (with paste on top) replaces the browser's default menu.
    p.canvas.addEventListener("contextmenu", (ev) => {
      ev.preventDefault();
      if (!p.modes.mouse) openCtx(ev.clientX, ev.clientY, paneMenuItems(p.id, true));
    });
  }

  // ---- Overlay + modal infrastructure (WS8) ----
  //
  // One overlay at a time (dialog, palette, or help) plus an independent
  // context menu. While any is open the keyboard belongs to the UI: onKey
  // returns early (no preventDefault, so modal inputs type normally) and a
  // capture-phase Escape closes whatever is up.

  let modalEl = null; // current #overlay root, or null
  let ctxEl = null;   // current #ctxmenu, or null
  let modalCleanup = null; // runs on any close path (settings preview rollback)
  function uiOpen() { return !!(modalEl || ctxEl); }

  function closeModal() {
    if (modalEl) { modalEl.remove(); modalEl = null; }
    if (modalCleanup) { const fn = modalCleanup; modalCleanup = null; fn(); }
  }
  function closeCtx() { if (ctxEl) { ctxEl.remove(); ctxEl = null; } }

  // openOverlay mounts a fresh overlay; build receives the overlay element and
  // appends its .modal. A mousedown on the backdrop dismisses.
  function openOverlay(build) {
    closeModal(); closeCtx();
    const ov = document.createElement("div");
    ov.id = "overlay";
    ov.addEventListener("mousedown", (e) => { if (e.target === ov) closeModal(); });
    build(ov);
    document.body.appendChild(ov);
    modalEl = ov;
    return ov;
  }

  function mkModalBtn(label, cls, fn) {
    const b = document.createElement("button");
    b.textContent = label; if (cls) b.className = cls;
    b.addEventListener("click", fn);
    return b;
  }

  // dialogInput: a rename-style prompt. Enter saves, Esc cancels; an empty
  // value is passed through (herdr semantics: empty clears the custom name).
  function dialogInput(opts) {
    openOverlay((ov) => {
      const m = document.createElement("div"); m.className = "modal";
      const h = document.createElement("header"); h.textContent = opts.title; m.appendChild(h);
      const body = document.createElement("div"); body.className = "body";
      const input = document.createElement("input");
      input.type = "text"; input.value = opts.value || ""; input.spellcheck = false;
      body.appendChild(input);
      if (opts.hint) { const t = document.createElement("div"); t.className = "hint"; t.textContent = opts.hint; body.appendChild(t); }
      m.appendChild(body);
      const submit = () => { const v = input.value; closeModal(); opts.onSubmit(v); };
      const btns = document.createElement("div"); btns.className = "btns";
      btns.appendChild(mkModalBtn("cancel", "", closeModal));
      btns.appendChild(mkModalBtn(opts.submitLabel || "save", "primary", submit));
      m.appendChild(btns);
      input.addEventListener("keydown", (e) => {
        e.stopPropagation();
        if (e.key === "Enter") { e.preventDefault(); submit(); }
        else if (e.key === "Escape") { e.preventDefault(); closeModal(); }
      });
      ov.appendChild(m);
      requestAnimationFrame(() => { input.focus(); input.select(); });
    });
  }

  // dialogConfirm: an explicit yes/no gate for destructive commands. Enter
  // confirms (the confirm button holds focus), Esc cancels.
  function dialogConfirm(opts) {
    openOverlay((ov) => {
      const m = document.createElement("div"); m.className = "modal";
      const h = document.createElement("header"); h.textContent = opts.title; m.appendChild(h);
      const body = document.createElement("div"); body.className = "body";
      const p = document.createElement("p"); p.textContent = opts.message; body.appendChild(p);
      if (opts.warn) { // red emphasis line (e.g. the dirty-worktree escalation)
        const wp = document.createElement("p"); wp.className = "errline"; wp.textContent = opts.warn;
        body.appendChild(wp);
      }
      m.appendChild(body);
      const go = () => { closeModal(); opts.onConfirm(); };
      const btns = document.createElement("div"); btns.className = "btns";
      btns.appendChild(mkModalBtn("cancel", "", closeModal));
      const ok = mkModalBtn(opts.confirmLabel || "confirm", opts.danger ? "danger" : "primary", go);
      btns.appendChild(ok);
      m.appendChild(btns);
      m.addEventListener("keydown", (e) => {
        e.stopPropagation();
        if (e.key === "Enter") { e.preventDefault(); go(); }
        else if (e.key === "Escape") { e.preventDefault(); closeModal(); }
      });
      ov.appendChild(m);
      requestAnimationFrame(() => ok.focus());
    });
  }

  // ---- Rename dialogs + close confirms (WS8): tab/workspace finally wired ----
  function renamePane(id) {
    const p = panes.get(id);
    dialogInput({
      title: "rename pane " + ((p && p.pub) || ("#" + id)),
      value: (p && p.title) || "",
      hint: "enter saves · empty clears the custom name · esc cancels",
      onSubmit: (name) => sendCmd("pane.rename", { pane: id, name }),
    });
  }
  function renameTab(t) {
    dialogInput({
      title: "rename tab " + t.num,
      value: t.name === String(t.num) ? "" : t.name,
      hint: "enter saves · empty reverts to the tab number · esc cancels",
      onSubmit: (name) => sendCmd("tab.rename", { num: t.num, name }),
    });
  }
  function renameWorkspace(w) {
    dialogInput({
      title: "rename workspace " + w.id,
      value: w.name,
      hint: "enter saves · empty reverts to auto-naming · esc cancels",
      onSubmit: (name) => sendCmd("workspace.rename", { id: w.id, name }),
    });
  }
  function confirmCloseWorkspace(w) {
    dialogConfirm({
      title: "close workspace",
      message: "Close workspace “" + w.name + "” (" + w.id + ")? All of its tabs and panes will be closed.",
      confirmLabel: "close workspace", danger: true,
      onConfirm: () => sendCmd("workspace.close", { id: w.id }),
    });
  }
  function confirmStopServer() {
    dialogConfirm({
      title: "stop server",
      message: "Stop the herdr server? Session state is saved and the persistent termhost daemon keeps your shells alive, but every browser disconnects.",
      confirmLabel: "stop server", danger: true,
      onConfirm: () => sendCmd("server.stop", {}),
    });
  }

  // ---- Context menus (WS8): pane / tab / workspace ----
  function openCtx(x, y, items) {
    closeCtx();
    const m = document.createElement("div");
    m.id = "ctxmenu";
    for (const it of items) {
      if (it === "-") {
        const s = document.createElement("div"); s.className = "sep"; m.appendChild(s);
        continue;
      }
      const el = document.createElement("div");
      el.className = "item" + (it.danger ? " danger" : "");
      el.textContent = it.label;
      el.addEventListener("click", () => { closeCtx(); it.fn(); });
      m.appendChild(el);
    }
    document.body.appendChild(m);
    // Clamp into the viewport after measuring.
    const r = m.getBoundingClientRect();
    m.style.left = Math.min(x, window.innerWidth - r.width - 4) + "px";
    m.style.top = Math.min(y, window.innerHeight - r.height - 4) + "px";
    ctxEl = m;
  }
  window.addEventListener("mousedown", (e) => {
    if (ctxEl && !ctxEl.contains(e.target)) closeCtx();
  }, true);
  window.addEventListener("blur", () => closeCtx());

  function paneMenuItems(id, onCanvas) {
    const items = [];
    if (onCanvas) items.push({ label: "paste", fn: pasteText }, "-");
    items.push(
      { label: "split left/right ⊟", fn: () => sendCmd("pane.split", { pane: id, direction: "h" }) },
      { label: "split top/bottom ⊞", fn: () => sendCmd("pane.split", { pane: id, direction: "v" }) },
      { label: "toggle zoom ⤢", fn: () => sendCmd("pane.zoom", { pane: id }) },
      "-",
      { label: "copy mode", fn: () => enterCopyMode(id) },
      { label: "copy scrollback", fn: () => copyScrollback(id) },
      "-",
      { label: "rename pane…", fn: () => renamePane(id) },
      { label: "close pane", danger: true, fn: () => sendCmd("pane.close", { pane: id }) },
    );
    return items;
  }
  function tabMenuItems(t, count) {
    const items = [
      { label: "new tab", fn: () => sendCmd("tab.create", {}) },
      { label: "rename tab…", fn: () => renameTab(t) },
    ];
    if (count > 1) items.push({ label: "close tab", danger: true, fn: () => sendCmd("tab.close", { num: t.num }) });
    return items;
  }
  function wsMenuItems(w) {
    return [
      { label: "new workspace", fn: () => sendCmd("workspace.create", {}) },
      { label: "rename workspace…", fn: () => renameWorkspace(w) },
      "-",
      { label: "new worktree…", fn: openNewWorktreeDialog },
      { label: "open worktree…", fn: openWorktreeOpenDialog },
      { label: "delete worktree checkout…", danger: true, fn: () => removeWorktreeFor(w) },
      "-",
      { label: "close workspace…", danger: true, fn: () => confirmCloseWorkspace(w) },
    ];
  }

  // ---- Worktree dialogs (WS8): new / open / remove git-worktree checkouts ----
  //
  // Web adaptation of herdr's prefix+w dialogs over the §7 worktree.* commands.
  // Everything anchors on the focused pane's repo (the server resolves it from
  // the pane's live cwd); worktree.list also reports which checkouts already
  // have an open workspace.

  // branchPathSlug mirrors the server's BranchToPathSlug so the new-worktree
  // dialog can preview the derived checkout path per keystroke.
  function branchPathSlug(branch) {
    let out = "", dash = false;
    for (const ch of branch) {
      if (/[a-zA-Z0-9]/.test(ch)) { out += ch.toLowerCase(); dash = false; }
      else if (!dash) { out += "-"; dash = true; }
    }
    out = out.replace(/^-+|-+$/g, "");
    return out || "worktree";
  }

  // generatedBranchSlug mirrors the server's GeneratedBranchSlug (same word
  // lists) for the dialog's prefill; the server would generate one too if the
  // branch were omitted.
  function generatedBranchSlug(seed) {
    const adj = ["brave", "calm", "clear", "green", "lucky", "quiet", "rapid", "silver"];
    const nouns = ["river", "cloud", "field", "forest", "harbor", "meadow", "stone", "valley"];
    const suffix = (seed & 0xffff).toString(16).padStart(4, "0");
    return "worktree/" + adj[seed % 8] + "-" + nouns[Math.floor(seed / 8) % 8] + "-" + suffix;
  }

  function worktreeStatus(e, repoRoot) {
    if (e.open_workspace) return "open";
    if (e.detached) return "detached";
    if (e.path === repoRoot) return "root";
    return "";
  }

  // withWorktreeList runs fn with the focused pane's worktree.list result,
  // toasting (not dialoging) when the pane isn't in a git repo.
  function withWorktreeList(fn) {
    sendCmdAwait("worktree.list", {}, (res) => {
      if (!res.ok) { toast("worktree: " + (res.error || "unknown")); return; }
      fn(res.data || {});
    });
  }

  function openNewWorktreeDialog() {
    withWorktreeList((info) => {
      openOverlay((ov) => {
        const m = document.createElement("div"); m.className = "modal";
        const h = document.createElement("header"); h.textContent = "new worktree — " + info.repo_name; m.appendChild(h);
        const body = document.createElement("div"); body.className = "body";
        const input = document.createElement("input");
        input.type = "text"; input.spellcheck = false;
        input.value = generatedBranchSlug(Date.now());
        body.appendChild(input);
        const pathEl = document.createElement("div"); pathEl.className = "hint"; body.appendChild(pathEl);
        const errEl = document.createElement("div"); errEl.className = "errline"; body.appendChild(errEl);
        m.appendChild(body);
        const syncPath = () => {
          pathEl.textContent = "checkout: " + info.worktree_root + "/" + info.repo_name + "/" +
            branchPathSlug(input.value.trim());
          errEl.textContent = "";
        };
        syncPath();
        let creating = false; // re-entry guard while git runs
        const create = () => {
          const branch = input.value.trim();
          if (!branch) { errEl.textContent = "branch is required"; return; }
          if (creating) return;
          creating = true;
          goBtn.disabled = true;
          sendCmdAwait("worktree.create", { branch }, (res) => {
            creating = false; goBtn.disabled = false;
            if (!res.ok) { errEl.textContent = res.error || "worktree add failed"; return; }
            closeModal();
            toast("worktree " + branch + " created");
          });
        };
        const btns = document.createElement("div"); btns.className = "btns";
        btns.appendChild(mkModalBtn("cancel", "", closeModal));
        const goBtn = mkModalBtn("create and open", "primary", create);
        btns.appendChild(goBtn);
        m.appendChild(btns);
        input.addEventListener("input", syncPath);
        input.addEventListener("keydown", (e) => {
          e.stopPropagation();
          if (e.key === "Enter") { e.preventDefault(); create(); }
          else if (e.key === "Escape") { e.preventDefault(); closeModal(); }
        });
        ov.appendChild(m);
        // Selected prefill: the first keystroke replaces the generated slug.
        requestAnimationFrame(() => { input.focus(); input.select(); });
      });
    });
  }

  function openWorktreeOpenDialog() {
    withWorktreeList((info) => {
      const entries = (info.worktrees || []).filter((e) => !e.prunable);
      if (!entries.length) { toast("no git worktrees found for this repo"); return; }
      let sel = 0, query = "";
      let listEl, inputEl;

      // Filter: case-insensitive AND of whitespace tokens over branch+path+status.
      const rows = () => {
        const toks = query.toLowerCase().split(/\s+/).filter(Boolean);
        return entries.filter((e) => {
          const hay = ((e.branch || "") + " " + e.path + " " + worktreeStatus(e, info.repo_root)).toLowerCase();
          return toks.every((t) => hay.includes(t));
        });
      };
      const choose = (e) => {
        closeModal();
        sendCmdAwait("worktree.open", { path: e.path }, (res) => {
          if (!res.ok) { toast("open worktree failed: " + (res.error || "unknown")); return; }
          if (res.data && res.data.already_open) toast("switched to open worktree");
        });
      };
      const render = () => {
        const rs = rows();
        if (sel >= rs.length) sel = Math.max(0, rs.length - 1);
        listEl.innerHTML = "";
        if (!rs.length) {
          const el = document.createElement("div"); el.className = "empty"; el.textContent = "no matches";
          listEl.appendChild(el); return;
        }
        rs.forEach((e, i) => {
          const row = document.createElement("div");
          row.className = "row" + (i === sel ? " sel" : "");
          const kind = document.createElement("span"); kind.className = "kind";
          kind.textContent = worktreeStatus(e, info.repo_root);
          const lbl = document.createElement("span"); lbl.className = "lbl";
          lbl.textContent = e.branch || e.path.split("/").pop();
          const meta = document.createElement("span"); meta.className = "meta"; meta.textContent = e.path;
          row.appendChild(kind); row.appendChild(lbl); row.appendChild(meta);
          row.addEventListener("click", () => choose(e));
          row.addEventListener("mousemove", () => { if (sel !== i) { sel = i; render(); } });
          listEl.appendChild(row);
        });
        const cur = listEl.children[sel];
        if (cur && cur.scrollIntoView) cur.scrollIntoView({ block: "nearest" });
      };

      openOverlay((ov) => {
        const m = document.createElement("div"); m.className = "modal pal";
        const h = document.createElement("header"); h.textContent = "open worktree — " + info.repo_name; m.appendChild(h);
        const q = document.createElement("div"); q.className = "query";
        inputEl = document.createElement("input");
        inputEl.type = "text"; inputEl.placeholder = "filter by branch, path, or status"; inputEl.spellcheck = false;
        q.appendChild(inputEl); m.appendChild(q);
        listEl = document.createElement("div"); listEl.className = "list"; m.appendChild(listEl);
        inputEl.addEventListener("input", () => { query = inputEl.value; sel = 0; render(); });
        inputEl.addEventListener("keydown", (e) => {
          e.stopPropagation();
          if (e.key === "ArrowDown") { e.preventDefault(); sel++; render(); }
          else if (e.key === "ArrowUp") { e.preventDefault(); sel = Math.max(0, sel - 1); render(); }
          else if (e.key === "Enter") { e.preventDefault(); const rs = rows(); if (rs[sel]) choose(rs[sel]); }
          else if (e.key === "Escape") { e.preventDefault(); closeModal(); }
        });
        ov.appendChild(m);
        requestAnimationFrame(() => inputEl.focus());
        render();
      });
    });
  }

  // removeWorktreeFor gates the menu action on membership: the workspace must be
  // an open linked checkout of the focused pane's repo (worktree.list says so).
  function removeWorktreeFor(w) {
    withWorktreeList((info) => {
      const entry = (info.worktrees || []).find((e) => e.open_workspace === w.id && e.path !== info.repo_root);
      if (!entry) { toast(w.name + " is not an open worktree checkout of this repo"); return; }
      confirmRemoveWorktree(w, entry.path, false);
    });
  }

  // Two-step force escalation: a plain remove that fails on dirty/untracked
  // files re-opens the confirm with the red delete-anyway warning.
  function confirmRemoveWorktree(w, path, force) {
    dialogConfirm({
      title: "delete worktree checkout",
      message: "This removes the checkout folder: " + path +
        " — the branch is not deleted. The workspace will close.",
      warn: force ? "Dirty or untracked files will be permanently deleted." : "",
      confirmLabel: force ? "delete anyway" : "delete checkout", danger: true,
      onConfirm: () => sendCmdAwait("worktree.remove", { workspace: w.id, force }, (res) => {
        if (res.ok) { toast("worktree checkout removed"); return; }
        const err = res.error || "";
        if (!force && err.startsWith("dirty_worktree_requires_force")) {
          confirmRemoveWorktree(w, path, true);
        } else {
          toast("remove worktree failed: " + err);
        }
      }),
    });
  }

  // ---- Command palette / navigator (WS8) ----
  //
  // One fuzzy list over both surfaces herdr splits in two: the Navigator
  // (jump to any pane/tab/workspace, with agent-state context) and a command
  // list built on the §7 vocabulary. Panes come from a live pane.list query so
  // the palette reaches across workspaces, not just the viewport.

  function focusedPaneId() {
    if (!layoutMsg) return null;
    const pr = layoutMsg.panes.find((p) => p.focused);
    return pr ? pr.pane : null;
  }
  function activeTab() { return layoutMsg ? layoutMsg.tabs.find((t) => t.active) : null; }
  function activeWorkspace() { return layoutMsg ? layoutMsg.workspaces.find((w) => w.active) : null; }

  function paletteCommands() {
    const f = focusedPaneId(), at = activeTab(), aw = activeWorkspace();
    const items = [
      { label: "new tab", fn: () => sendCmd("tab.create", {}) },
      { label: "new workspace", fn: () => sendCmd("workspace.create", {}) },
      { label: "split left/right", fn: () => sendCmd("pane.split", { direction: "h" }) },
      { label: "split top/bottom", fn: () => sendCmd("pane.split", { direction: "v" }) },
      { label: "toggle zoom", fn: () => sendCmd("pane.zoom", {}) },
      { label: "close pane", fn: () => sendCmd("pane.close", {}) },
      { label: "new worktree", fn: openNewWorktreeDialog },
      { label: "open worktree", fn: openWorktreeOpenDialog },
      { label: "settings", fn: openSettings },
      { label: "reload config", fn: () => sendCmd("server.reload_config", {}) },
      { label: "keyboard shortcuts", fn: openHelp },
      { label: "stop server…", fn: confirmStopServer },
    ];
    if (f !== null) {
      items.push(
        { label: "rename pane…", fn: () => renamePane(f) },
        { label: "copy mode", fn: () => enterCopyMode(f) },
        { label: "copy scrollback", fn: () => copyScrollback(f) },
      );
    }
    if (at) {
      items.push({ label: "rename tab…", fn: () => renameTab(at) });
      if (layoutMsg.tabs.length > 1) items.push({ label: "close tab", fn: () => sendCmd("tab.close", { num: at.num }) });
    }
    if (aw) {
      items.push(
        { label: "rename workspace…", fn: () => renameWorkspace(aw) },
        { label: "close workspace…", fn: () => confirmCloseWorkspace(aw) },
      );
    }
    return items.map((it) => ({ kind: "cmd", label: it.label, meta: "", fn: it.fn }));
  }

  // fuzzyScore: subsequence match with a run bonus and a word-start bonus;
  // -1 = no match, higher = better.
  function fuzzyScore(q, s) {
    q = q.toLowerCase(); s = s.toLowerCase();
    if (!q) return 0;
    let qi = 0, score = 0, run = 0;
    for (let i = 0; i < s.length && qi < q.length; i++) {
      if (s[i] === q[qi]) {
        qi++; run++;
        score += run + (i === 0 || " :·.-_/".includes(s[i - 1]) ? 3 : 0);
      } else run = 0;
    }
    return qi === q.length ? score : -1;
  }

  function openPalette() {
    let items = [];   // static part: workspaces, tabs, commands
    let paneItems = []; // async part: pane.list across all workspaces
    let sel = 0, query = "";
    let listEl, inputEl;

    if (layoutMsg) {
      for (const w of layoutMsg.workspaces) {
        items.push({ kind: "ws", label: w.name + " (" + w.id + ")", meta: w.active ? "active" : "",
          fn: () => { if (!w.active) sendCmd("workspace.focus", { id: w.id }); } });
      }
      for (const t of layoutMsg.tabs) {
        items.push({ kind: "tab", label: t.name, meta: t.active ? "active" : "",
          fn: () => { if (!t.active) sendCmd("tab.focus", { num: t.num }); } });
      }
    }
    items = items.concat(paletteCommands());

    const filtered = () => {
      const all = paneItems.concat(items);
      if (!query) return all;
      return all
        .map((it) => ({ it, s: fuzzyScore(query, it.label + " " + it.meta + " " + it.kind) }))
        .filter((x) => x.s >= 0)
        .sort((a, b) => b.s - a.s)
        .map((x) => x.it);
    };

    const render = () => {
      const rows = filtered();
      if (sel >= rows.length) sel = Math.max(0, rows.length - 1);
      listEl.innerHTML = "";
      if (!rows.length) {
        const e = document.createElement("div"); e.className = "empty"; e.textContent = "no matches";
        listEl.appendChild(e); return;
      }
      rows.slice(0, 60).forEach((it, i) => {
        const row = document.createElement("div");
        row.className = "row" + (i === sel ? " sel" : "");
        const kind = document.createElement("span"); kind.className = "kind"; kind.textContent = it.kind;
        const lbl = document.createElement("span"); lbl.className = "lbl"; lbl.textContent = it.label;
        row.appendChild(kind); row.appendChild(lbl);
        if (it.meta) {
          const meta = document.createElement("span");
          meta.className = "meta" + (it.stateClass ? " " + it.stateClass : "");
          meta.textContent = it.meta;
          row.appendChild(meta);
        }
        row.addEventListener("click", () => { closeModal(); it.fn(); });
        row.addEventListener("mousemove", () => { if (sel !== i) { sel = i; render(); } });
        listEl.appendChild(row);
      });
      const cur = listEl.children[sel];
      if (cur && cur.scrollIntoView) cur.scrollIntoView({ block: "nearest" });
    };

    openOverlay((ov) => {
      const m = document.createElement("div"); m.className = "modal pal";
      const q = document.createElement("div"); q.className = "query";
      inputEl = document.createElement("input");
      inputEl.type = "text"; inputEl.placeholder = "jump to a pane, tab, workspace — or run a command"; inputEl.spellcheck = false;
      q.appendChild(inputEl); m.appendChild(q);
      listEl = document.createElement("div"); listEl.className = "list"; m.appendChild(listEl);
      inputEl.addEventListener("input", () => { query = inputEl.value; sel = 0; render(); });
      inputEl.addEventListener("keydown", (e) => {
        e.stopPropagation();
        if (e.key === "ArrowDown") { e.preventDefault(); sel++; render(); }
        else if (e.key === "ArrowUp") { e.preventDefault(); sel = Math.max(0, sel - 1); render(); }
        else if (e.key === "Enter") {
          e.preventDefault();
          const rows = filtered();
          if (rows[sel]) { closeModal(); rows[sel].fn(); }
        } else if (e.key === "Escape") { e.preventDefault(); closeModal(); }
      });
      ov.appendChild(m);
      requestAnimationFrame(() => inputEl.focus());
      render();
    });

    // Panes across all workspaces (agent.focus crosses workspace + tab).
    sendCmdAwait("pane.list", {}, (res) => {
      if (!res.ok || !modalEl) return;
      const byPane = new Map(agentItems.map((a) => [a.pane, a]));
      paneItems = (res.data && res.data.panes ? res.data.panes : []).map((pi) => {
        const a = byPane.get(pi.pane);
        return {
          kind: "pane",
          label: (pi.handle || ("#" + pi.pane)) + (pi.name ? " · " + pi.name : ""),
          meta: a ? a.agent + ":" + a.state : (pi.focused ? "focused" : ""),
          stateClass: a ? stClass(a.state) : "",
          fn: () => sendCmd("agent.focus", { pane: pi.pane }),
        };
      });
      render();
    });
  }

  // ---- Keyboard help (WS8) ----
  function helpSection(title, rows) {
    const wrap = document.createElement("div");
    const h = document.createElement("h3"); h.textContent = title; wrap.appendChild(h);
    const tbl = document.createElement("table");
    for (const [what, keys] of rows) {
      const tr = document.createElement("tr");
      const td1 = document.createElement("td"); td1.textContent = what;
      const td2 = document.createElement("td");
      for (const k of keys) { const kb = document.createElement("span"); kb.className = "key"; kb.textContent = k; td2.appendChild(kb); }
      tr.appendChild(td1); tr.appendChild(td2); tbl.appendChild(tr);
    }
    wrap.appendChild(tbl);
    return wrap;
  }

  function openHelp() {
    openOverlay((ov) => {
      const m = document.createElement("div"); m.className = "modal help";
      const h = document.createElement("header"); h.textContent = "keyboard & mouse reference"; m.appendChild(h);
      const body = document.createElement("div"); body.className = "body";
      const cols = document.createElement("div"); cols.className = "helpcols";
